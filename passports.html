<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passport Calculator — Rise of Kingdoms</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;600&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--neon-yellow:#ffe600;--neon-gold:#ffdd00;--neon-amber:#ffb300;--neon-red:#ff1030;--neon-green:#00ff88;--dark-bg:#0a0a0f;--panel-bg:#12121a;--input-bg:#0d0d1a;--border-glow:rgba(255,230,0,0.3);--text-primary:#fff8dc;--text-dim:#e0d8b0;--text-muted:#c0b080;--font-display:'Orbitron',monospace;--font-body:'Rajdhani',sans-serif;--font-mono:'Fira Code',monospace}
body{background:var(--dark-bg);color:var(--text-primary);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(rgba(255,230,0,0.05)1px,transparent 1px),linear-gradient(90deg,rgba(255,230,0,0.05)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12)2px,rgba(0,0,0,0.12)4px);pointer-events:none;z-index:1}
.app{position:relative;z-index:2;max-width:700px;margin:0 auto;padding:20px}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-family:var(--font-display);font-size:2rem;font-weight:900;text-transform:uppercase;letter-spacing:4px;background:linear-gradient(135deg,var(--neon-yellow),var(--neon-amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px rgba(255,230,0,0.4))}
.glitch-line{height:2px;margin:12px 0 0;background:linear-gradient(90deg,transparent,var(--neon-yellow),var(--neon-gold),transparent);box-shadow:0 0 20px rgba(255,230,0,0.4)}
.flicker-glow-text{animation:flicker-glow-text 4s infinite}
@keyframes flicker-glow-text{0%,82%{-webkit-text-stroke:0 transparent}86%{-webkit-text-stroke:1.5px #ff1030}90%{-webkit-text-stroke:0 transparent}94%{-webkit-text-stroke:1.5px #ff1030}98%{-webkit-text-stroke:0 transparent}100%{-webkit-text-stroke:0 transparent}}
.lang-switch{position:fixed;top:2px;right:8px;display:flex;gap:2px;z-index:10}
.lang-btn{font-family:var(--font-mono);font-size:0.6rem;padding:3px 8px;background:var(--input-bg);border:1px solid rgba(255,230,0,0.2);color:var(--text-muted);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:1px}
.lang-btn:first-child{border-radius:3px 0 0 3px}
.lang-btn:last-child{border-radius:0 3px 3px 0}
.lang-btn.active{background:var(--neon-yellow);color:#000;border-color:var(--neon-yellow)}
.lang-btn:hover:not(.active){border-color:var(--neon-yellow)}
.cal-btn{font-family:var(--font-display);font-size:0.6rem;padding:3px 8px;background:var(--input-bg);border:1px solid rgba(255,230,0,0.2);color:var(--text-muted);cursor:pointer;text-decoration:none;text-transform:uppercase;letter-spacing:1px;transition:all 0.2s}
.cal-btn:hover{border-color:var(--neon-yellow);color:var(--neon-yellow)}
.cyber-banner-small{width:100%;max-width:120px;margin:0 auto 20px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,230,0,0.3);box-shadow:0 0 30px rgba(255,230,0,0.2),inset 0 0 40px rgba(255,230,0,0.05);position:relative;background:var(--panel-bg);padding:8px}
.cyber-banner-small::before{content:'';position:absolute;top:-5px;left:-5px;right:-5px;bottom:-5px;border-radius:50%;background:linear-gradient(45deg,rgba(255,230,0,0.1),transparent,rgba(255,230,0,0.1));animation:rotate 8s linear infinite;pointer-events:none}
.cyber-banner-small img{display:block;width:100%;height:auto;border-radius:50%;position:relative;z-index:1}
.cyber-banner-small::after{content:'';position:absolute;top:8px;left:8px;right:8px;bottom:8px;border-radius:50%;background:linear-gradient(135deg,rgba(255,230,0,0.1),transparent 45%,transparent 55%,rgba(255,230,0,0.03));animation:shimmer 6s linear infinite;pointer-events:none;z-index:2}
@keyframes shimmer{to{transform:rotate(360deg)}}
@keyframes rotate{to{transform:rotate(360deg)}}
.panel{background:var(--panel-bg);border:1px solid var(--border-glow);border-radius:4px;padding:20px;margin-bottom:16px;box-shadow:0 0 20px rgba(255,230,0,0.06),inset 0 0 30px rgba(255,230,0,0.03)}
label{font-family:var(--font-display);font-size:0.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:4px}
input{font-family:var(--font-body);font-size:1.1rem;padding:10px 14px;background:var(--input-bg);border:1px solid rgba(255,230,0,0.25);color:var(--text-primary);border-radius:3px;outline:none;transition:border-color 0.2s;width:100%;letter-spacing:0.5px}
input:focus{border-color:var(--neon-yellow);box-shadow:0 0 15px rgba(255,230,0,0.15)}
.row{display:flex;flex-wrap:wrap;gap:12px;align-items:end}
.col{display:flex;flex-direction:column;gap:6px;flex:1;min-width:120px}
.warning-box{background:rgba(255,16,48,0.1);border:1px solid var(--neon-red);border-radius:3px;padding:12px 16px;margin-bottom:12px;color:var(--neon-red);font-family:var(--font-mono);font-size:0.8rem;display:none}
.warning-box.visible{display:block}
.result-panel{text-align:center;padding:24px 20px}
.result-value{font-family:var(--font-display);font-size:2.5rem;font-weight:900;color:var(--neon-yellow);text-shadow:0 0 30px rgba(255,230,0,0.3);margin:4px 0}
.result-label{font-family:var(--font-display);font-size:0.65rem;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px}
.result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:16px}
.result-item{background:rgba(255,255,255,0.02);border:1px solid rgba(255,230,0,0.1);border-radius:3px;padding:12px}
.result-item .ri-value{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--neon-amber)}
.result-item .ri-label{font-family:var(--font-mono);font-size:0.55rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.suggestion{background:rgba(255,230,0,0.05);border:1px solid rgba(255,230,0,0.15);border-radius:3px;padding:16px;margin-top:12px;font-family:var(--font-mono);font-size:0.85rem;line-height:1.8}
.suggestion .hl{color:var(--neon-yellow);font-weight:700}
.suggestion .dim{color:var(--text-dim)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--dark-bg)}
::-webkit-scrollbar-thumb{background:var(--neon-yellow);border-radius:3px}
@media(max-width:768px){.header{padding-top:36px}.header h1{font-size:1.4rem;letter-spacing:2px}.app{padding:10px}.panel{padding:12px}.row{gap:10px}.col{min-width:100px}.result-grid{grid-template-columns:1fr 1fr}.result-value{font-size:2rem}}
</style>
</head>
<body>
<div class="lang-switch">
  <a href="calendar.html" class="cal-btn">📅 Calendar</a>
  <button class="lang-btn" data-lang="ru">RU</button>
  <button class="lang-btn" data-lang="en">EN</button>
</div>
<div class="app">
  <header class="header">
    <div style="text-align:left;margin-bottom:4px">
      <a href="index.html" style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);text-decoration:none;letter-spacing:1px">← Главная</a>
    </div>
    <h1 class="flicker-glow-text">PASSPORTS</h1>
    <div class="glitch-line"></div>
  </header>
  <div class="cyber-banner-small flicker-glow"><img src="logo.png" alt="PASSPORTS" loading="lazy" onerror="this.style.display='none'"></div>

  <div class="panel">
    <div class="row">
      <div class="col"><label>Мощь</label><input type="text" id="powerInput" inputmode="numeric" placeholder="10 000 000"></div>
      <div class="col"><label>Госпиталь</label><input type="number" id="hospCap" value="0" min="0"></div>
      <div class="col"><label>T4</label><input type="number" id="t4in" value="0" min="0"></div>
      <div class="col"><label>T5</label><input type="number" id="t5in" value="0" min="0"></div>
    </div>
  </div>

  <div class="warning-box" id="deathWarn"><span id="deathText"></span></div>

  <div class="panel result-panel">
    <div class="result-value" id="passDisplay">1</div>
    <div class="result-label">Паспортов</div>

    <div class="suggestion" id="suggestion">
      Снизить с <span class="hl" id="curP">1</span> до <span class="hl" id="prevP">1</span> паспортов: мощь до <span class="hl" id="targetPower">0</span> (сбросить <span class="hl" id="shedPower">0</span>)
      <br>T4: <span class="hl" id="t4suggest">0</span>
      <span class="dim" id="mixSpan">(T5: <span id="t5suggest">0</span> + T4: <span id="t4mix">0</span>)</span>
    </div>

    <div class="suggestion" id="manualBox" style="display:none;margin-top:8px">
      Мощь с заполнением госпиталя: <span class="hl" id="manualPower">0</span>
      <span class="dim">—</span> Паспортов: <span class="hl" id="manualPass">0</span>
    </div>

    <div class="result-grid">
      <div class="result-item"><div class="ri-value" id="credDisplay">600 000</div><div class="ri-label">Кредиты</div></div>
      <div class="result-item"><div class="ri-value" id="timeDisplay">~15</div><div class="ri-label">Дней</div></div>
      <div class="result-item"><div class="ri-value" id="cppDisplay">600 000</div><div class="ri-label">Кредитов/пасс</div></div>
    </div>
  </div>

  <div class="panel" style="padding:20px 20px 4px">
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:0.7rem">
        <thead><tr><th style="font-family:var(--font-display);font-size:0.5rem;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.15);text-align:left">Мощь</th><th style="font-family:var(--font-display);font-size:0.5rem;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.15);text-align:right">Паспортов</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const CPP=600000,DP=15,P4=4,P5=10;
const THR=[{max:10,p:1},{max:15,p:2},{max:20,p:3},{max:25,p:4},{max:30,p:6},{max:35,p:9},{max:40,p:12},{max:45,p:15},{max:50,p:20},{max:55,p:25},{max:60,p:30}];
const LANG={ru:{cal:'📅 Calendar',tdie:'погибнет'},en:{cal:'📅 Calendar',tdie:'will die'}};
const det=navigator.language.startsWith('ru')?'ru':'en';
let lang=localStorage.getItem('lang')||det;
function t(k){return LANG[lang][k]||k}
function applyLang(){document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));document.documentElement.lang=lang}
document.querySelectorAll('.lang-btn').forEach(b=>{b.addEventListener('click',()=>{lang=b.dataset.lang;localStorage.setItem('lang',lang);applyLang();calc()})});
applyLang();
function fn(n){return Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')}
function pass(pm){if(pm<=0)return 0;for(const t of THR){if(pm<t.max)return t.p}return 30+Math.ceil((pm-60)/5)*5}
function getPrevTier(curP){
  let prev=null;
  for(const t of THR){
    if(t.p<curP)prev=t;
    else break;
  }
  return prev;
}
const pi=document.getElementById('powerInput');
pi.addEventListener('input',function(){const r=this.value.replace(/\s/g,'').replace(/[^\d]/g,'');this.value=r?fn(parseInt(r)):'';calc()});
pi.addEventListener('focus',function(){this.select()});
['hospCap','t4in','t5in'].forEach(id=>document.getElementById(id).addEventListener('input',calc));

function calc(){
  const raw=pi.value.replace(/\s/g,'');
  const pw=parseFloat(raw)||0;
  const pm=pw/1000000;
  const curP=pass(pm);
  const cap=parseInt(document.getElementById('hospCap').value)||0;
  const t4m=parseInt(document.getElementById('t4in').value)||0;
  const t5m=parseInt(document.getElementById('t5in').value)||0;
  const p=pass(pm);
  document.getElementById('passDisplay').textContent=p;
  document.getElementById('credDisplay').textContent=fn(p*CPP);
  document.getElementById('timeDisplay').textContent='~'+(p*DP);
  document.getElementById('cppDisplay').textContent=fn(CPP);
  const dw=document.getElementById('deathWarn');
  const dt=document.getElementById('deathText');
  // Manual T4/T5
  const mb=document.getElementById('manualBox');
  if(t4m>0||t5m>0){
    const hp=t4m*P4+t5m*P5;
    const tot=t4m+t5m;
    const eff=Math.max(0,pw-hp);
    document.getElementById('manualPower').textContent=fn(eff);
    document.getElementById('manualPass').textContent=pass(eff/1000000);
    mb.style.display='block';
    if(cap>0&&tot>cap){dw.classList.add('visible');dt.textContent=fn(tot-cap)+' '+t('tdie')+' (T4+T5)'}
    else{dw.classList.remove('visible')}
  }else{mb.style.display='none'}
  // Suggestion for previous tier
  const sug=document.getElementById('suggestion');
  const prev=getPrevTier(curP);
  if(prev){
    const targetMax=prev.max*1000000;
    const shed=pw-targetMax;
    if(shed>0){
      sug.style.display='block';
      document.getElementById('curP').textContent=curP;
      document.getElementById('prevP').textContent=prev.p;
      document.getElementById('targetPower').textContent=fn(targetMax);
      document.getElementById('shedPower').textContent=fn(shed);
      const t4only=Math.ceil(shed/P4);
      const t5cnt=Math.floor(shed/P5);
      const remain=shed-t5cnt*P5;
      const t4mix=remain>0?Math.ceil(remain/P4):0;
      document.getElementById('t4suggest').textContent=fn(t4only);
      document.getElementById('t5suggest').textContent=t5cnt;
      document.getElementById('t4mix').textContent=t4mix;
      const ms=document.getElementById('mixSpan');
      if(t5cnt>0||t4mix>0){ms.style.display='inline'}else{ms.style.display='none'}
      if(cap>0&&t4only>cap){
        if(!dw.classList.contains('visible')){dw.classList.add('visible');dt.textContent=fn(t4only-cap)+' '+t('tdie')+' (T4)'}
      }
    }else{sug.style.display='none'}
  }else{sug.style.display='none'}
  render(pm);
}
function render(pm){
  const tb=document.getElementById('tableBody');let h='';
  for(const t of THR){const a=pm<t.max?'color:var(--neon-yellow);font-weight:700':'';h+=`<tr><td style="padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.06);text-align:left;${a}">${fn((t.max-5)*1000000)}–${fn(t.max*1000000-1)}</td><td style="padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.06);text-align:right;${a}">${t.p}</td></tr>`}
  if(pm>=60){
    const a=pm<65?'color:var(--neon-yellow);font-weight:700':'';
    h+=`<tr><td style="padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.06);text-align:left;${a}">${fn(60000000)}–${fn(64999999)}</td><td style="padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.06);text-align:right;${a}">30</td></tr>`;
    for(let m=65;m<=pm+5;m+=5){
      const pp=pass(m);const a=pm<m+5&&pm>=m?'color:var(--neon-yellow);font-weight:700':'';
      h+=`<tr><td style="padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.06);text-align:left;${a}">${fn((m-5)*1000000)}–${fn(m*1000000-1)}</td><td style="padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.06);text-align:right;${a}">${pp}</td></tr>`;
    }
  }
  tb.innerHTML=h;
}
calc();
</script>
</body>
</html>
