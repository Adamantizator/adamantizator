<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="title">Passport Calculator — Rise of Kingdoms</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --neon-yellow: #ffe600;
  --neon-gold: #ffdd00;
  --neon-amber: #ffb300;
  --neon-red: #ff1030;
  --neon-green: #00ff88;
  --neon-cyan: #00f0ff;
  --dark-bg: #0a0a0f;
  --panel-bg: #12121a;
  --card-bg: #1a1a2e;
  --input-bg: #0d0d1a;
  --border-glow: rgba(255, 230, 0, 0.3);
  --text-primary: #fff8dc;
  --text-dim: #e0d8b0;
  --text-muted: #c0b080;
  --font-display: 'Orbitron', monospace;
  --font-body: 'Rajdhani', sans-serif;
  --font-mono: 'Fira Code', monospace;
}

body {
  background: var(--dark-bg);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; top:0;left:0;right:0;bottom:0;
  background: linear-gradient(rgba(255,230,0,0.05) 1px,transparent 1px), linear-gradient(90deg,rgba(255,230,0,0.05) 1px,transparent 1px);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}
body::after {
  content: ''; position: fixed; top:0;left:0;right:0;bottom:0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);
  pointer-events: none; z-index: 1;
}

.app { position: relative; z-index: 2; max-width: 700px; margin: 0 auto; padding: 20px; }

.header { text-align: center; padding: 30px 0 20px; }
.header h1 {
  font-family: var(--font-display); font-size: 2rem; font-weight: 900;
  text-transform: uppercase; letter-spacing: 4px;
  background: linear-gradient(135deg, var(--neon-yellow), var(--neon-amber));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 30px rgba(255,230,0,0.4));
}
.glitch-line {
  height: 2px; margin: 12px 0 0;
  background: linear-gradient(90deg, transparent, var(--neon-yellow), var(--neon-gold), transparent);
  box-shadow: 0 0 20px rgba(255,230,0,0.4);
}

.flicker-glow-text { animation: flicker-glow-text 4s infinite; }
@keyframes flicker-glow-text {
  0%, 82% { -webkit-text-stroke: 0 transparent; }
  86% { -webkit-text-stroke: 1.5px #ff1030; }
  90% { -webkit-text-stroke: 0 transparent; }
  94% { -webkit-text-stroke: 1.5px #ff1030; }
  98% { -webkit-text-stroke: 0 transparent; }
  100% { -webkit-text-stroke: 0 transparent; }
}

.lang-switch { position: fixed; top: 2px; right: 8px; display: flex; gap: 2px; z-index: 10; }
.lang-btn {
  font-family: var(--font-mono); font-size: 0.6rem; padding: 3px 8px;
  background: var(--input-bg); border: 1px solid rgba(255,230,0,0.2);
  color: var(--text-muted); cursor: pointer; transition: all 0.2s;
  text-transform: uppercase; letter-spacing: 1px;
}
.lang-btn:first-child { border-radius: 3px 0 0 3px; }
.lang-btn:last-child { border-radius: 0 3px 3px 0; }
.lang-btn.active { background: var(--neon-yellow); color: #000; border-color: var(--neon-yellow); }
.lang-btn:hover:not(.active) { border-color: var(--neon-yellow); }

.cal-btn {
  font-family: var(--font-display); font-size: 0.6rem; padding: 3px 8px;
  background: var(--input-bg); border: 1px solid rgba(255,230,0,0.2);
  color: var(--text-muted); cursor: pointer; text-decoration: none;
  text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s;
}
.cal-btn:hover { border-color: var(--neon-yellow); color: var(--neon-yellow); }

.cyber-banner-small {
  width: 100%; max-width: 120px; margin: 0 auto 20px; border-radius: 50%; overflow: hidden;
  border: 2px solid rgba(255,230,0,0.3);
  box-shadow: 0 0 30px rgba(255,230,0,0.2), inset 0 0 40px rgba(255,230,0,0.05);
  position: relative; background: var(--panel-bg); padding: 8px;
}
.cyber-banner-small::before {
  content: ''; position: absolute; top:-5px;left:-5px;right:-5px;bottom:-5px; border-radius: 50%;
  background: linear-gradient(45deg, rgba(255,230,0,0.1), transparent, rgba(255,230,0,0.1));
  animation: rotate 8s linear infinite; pointer-events: none;
}
.cyber-banner-small img { display: block; width: 100%; height: auto; border-radius: 50%; position: relative; z-index: 1; }
.cyber-banner-small::after {
  content: ''; position: absolute; top:8px;left:8px;right:8px;bottom:8px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,230,0,0.1), transparent 45%, transparent 55%, rgba(255,230,0,0.03));
  animation: shimmer 6s linear infinite; pointer-events: none; z-index: 2;
}
@keyframes shimmer { to { transform: rotate(360deg); } }
@keyframes rotate { to { transform: rotate(360deg); } }

.panel {
  background: var(--panel-bg); border: 1px solid var(--border-glow); border-radius: 4px;
  padding: 20px; margin-bottom: 16px;
  box-shadow: 0 0 20px rgba(255,230,0,0.06), inset 0 0 30px rgba(255,230,0,0.03);
}

label {
  font-family: var(--font-display); font-size: 0.6rem; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 4px;
}

input, select {
  font-family: var(--font-body); font-size: 1.1rem; padding: 10px 14px;
  background: var(--input-bg); border: 1px solid rgba(255,230,0,0.25);
  color: var(--text-primary); border-radius: 3px; outline: none;
  transition: border-color 0.2s; width: 100%; letter-spacing: 0.5px;
}
input:focus, select:focus { border-color: var(--neon-yellow); box-shadow: 0 0 15px rgba(255,230,0,0.15); }
select { cursor: pointer; }
select option { background: var(--dark-bg); color: var(--text-primary); }

.row { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; }
.col { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }

.warning-box {
  background: rgba(255,16,48,0.1); border: 1px solid var(--neon-red);
  border-radius: 3px; padding: 12px 16px; margin-bottom: 12px;
  color: var(--neon-red); font-family: var(--font-mono); font-size: 0.8rem;
  display: none;
}
.warning-box.visible { display: block; }

.success-box {
  background: rgba(0,255,136,0.08); border: 1px solid var(--neon-green);
  border-radius: 3px; padding: 12px 16px; margin-bottom: 12px;
  color: var(--neon-green); font-family: var(--font-mono); font-size: 0.8rem;
  display: none;
}
.success-box.visible { display: block; }

.result-panel { text-align: center; padding: 24px 20px; }
.result-value {
  font-family: var(--font-display); font-size: 2.5rem; font-weight: 900;
  color: var(--neon-yellow); text-shadow: 0 0 30px rgba(255,230,0,0.3);
  margin: 4px 0;
}
.result-value.small { font-size: 1.6rem; }
.result-label {
  font-family: var(--font-display); font-size: 0.65rem; letter-spacing: 2px;
  color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px;
}
.result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 16px; }
.result-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.result-item {
  background: rgba(255,255,255,0.02); border: 1px solid rgba(255,230,0,0.1);
  border-radius: 3px; padding: 12px;
}
.result-item .ri-value {
  font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--neon-amber);
}
.result-item .ri-label {
  font-family: var(--font-mono); font-size: 0.55rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px; margin-top: 2px;
}

.tip-box {
  background: rgba(255,230,0,0.05); border: 1px solid rgba(255,230,0,0.15);
  border-radius: 3px; padding: 16px; margin-top: 12px;
  font-family: var(--font-mono); font-size: 0.8rem; line-height: 1.6;
}
.tip-box .num { color: var(--neon-yellow); font-weight: 700; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--dark-bg); }
::-webkit-scrollbar-thumb { background: var(--neon-yellow); border-radius: 3px; }

@media (max-width: 768px) {
  .header { padding-top: 36px; }
  .header h1 { font-size: 1.4rem; letter-spacing: 2px; }
  .app { padding: 10px; }
  .panel { padding: 12px; }
  .row { gap: 10px; }
  .col { min-width: 120px; }
  .result-grid { grid-template-columns: 1fr 1fr; }
  .result-value { font-size: 2rem; }
  .result-value.small { font-size: 1.3rem; }
}
</style>
</head>
<body>
<div class="lang-switch">
  <a href="calendar.html" class="cal-btn" data-i18n="cal">📅 Calendar</a>
  <button class="lang-btn" data-lang="ru">RU</button>
  <button class="lang-btn" data-lang="en">EN</button>
</div>
<div class="app">
  <header class="header">
    <div style="text-align:left;margin-bottom:4px;">
      <a href="index.html" style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);text-decoration:none;letter-spacing:1px;" data-i18n="back">← Главная</a>
    </div>
    <h1 class="flicker-glow-text">PASSPORTS</h1>
    <div class="glitch-line"></div>
  </header>

  <div class="cyber-banner-small flicker-glow">
    <img src="logo.png" alt="PASSPORTS" loading="lazy" onerror="this.style.display='none'">
  </div>

  <div class="panel">
    <div class="row">
      <div class="col">
        <label data-i18n="power">Мощь</label>
        <input type="text" id="powerInput" inputmode="numeric" placeholder="10 000 000">
      </div>
    </div>
    <div class="row" style="margin-top:12px;">
      <div class="col">
        <label data-i18n="target">Цель (паспортов)</label>
        <select id="targetSelect"></select>
      </div>
      <div class="col">
        <label data-i18n="hosp">Госпиталь</label>
        <input type="number" id="hospCap" value="0" min="0">
      </div>
      <div class="col">
        <label>T4</label>
        <input type="number" id="t4Count" value="0" min="0">
      </div>
      <div class="col">
        <label>T5</label>
        <input type="number" id="t5Count" value="0" min="0">
      </div>
    </div>
  </div>

  <div class="panel result-panel">
    <div class="result-grid cols-2">
      <div class="result-item">
        <div class="ri-value" id="curPass">—</div>
        <div class="ri-label" data-i18n="current">Сейчас</div>
      </div>
      <div class="result-item">
        <div class="ri-value" id="tgtPass">—</div>
        <div class="ri-label" data-i18n="targetLabel">Цель</div>
      </div>
    </div>

    <div class="tip-box" id="tipBox">
      <div data-i18n="tip_need_power">Нужно снизить мощь до</div>
      <span id="targetMaxPower" class="num"></span>
      <div style="margin-top:6px;">
        <span data-i18n="tip_power_shed">Сбросить мощи</span>
        <span id="powerShed" class="num"></span>
      </div>
      <div style="margin-top:6px;">
        <span data-i18n="tip_t4">T4 в госпиталь</span>
        <span id="tipT4" class="num"></span>
        <span style="color:var(--text-dim);">  или  </span>
        <span data-i18n="tip_t5">T5</span>
        <span id="tipT5" class="num"></span>
      </div>
    </div>
    <div class="tip-box" id="manualBox" style="display:none;margin-top:8px;">
      <span data-i18n="manual_power">Мощь с заполнением госпиталя</span>
      <span id="manualEffPower" class="num"></span>
      <span style="color:var(--text-dim);margin:0 6px;">|</span>
      <span data-i18n="pass_after">Паспортов</span>
      <span id="manualPass" class="num"></span>
    </div>
  </div>

  <div class="warning-box" id="deathWarn">
    <span id="deathText"></span>
  </div>
  <div class="success-box" id="okWarn">
    <span id="okText"></span>
  </div>

  <div class="panel" style="padding:20px 20px 4px;">
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:0.75rem;">
        <thead>
          <tr>
            <th style="font-family:var(--font-display);font-size:0.5rem;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;padding:6px 8px;border-bottom:1px solid rgba(255,230,0,0.15);text-align:left;" data-i18n="powCol">Мощь</th>
            <th style="font-family:var(--font-display);font-size:0.5rem;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;padding:6px 8px;border-bottom:1px solid rgba(255,230,0,0.15);text-align:right;" data-i18n="passCol">Паспортов</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const CPP = 600000;
const DP = 15;
const P4 = 4, P5 = 10;
const THR = [
  {max:10,p:1},{max:15,p:2},{max:20,p:3},{max:25,p:4},{max:30,p:6},
  {max:35,p:9},{max:40,p:12},{max:45,p:15},{max:50,p:20},{max:55,p:25},{max:60,p:30},
];

function pass(pm) {
  if (pm <= 0) return 0;
  for (const t of THR) { if (pm < t.max) return t.p; }
  return 30 + Math.ceil((pm - 60) / 5) * 5;
}

function maxPowerForPass(targetP) {
  if (targetP <= 0) return 0;
  for (const t of THR) { if (t.p === targetP) return t.max * 1000000 - 1; }
  if (targetP > 30) {
    const extra = targetP - 30;
    return (60 + extra) * 1000000 - 1;
  }
  return 0;
}

function fn(n) { return Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' '); }

const LANG = {
  ru: {
    back: '← Главная', title: 'Passport Calculator — Rise of Kingdoms',
    power: 'Мощь', target: 'Цель (паспортов)', hosp: 'Госпиталь',
    current: 'Сейчас', targetLabel: 'Цель',
    tip_need_power: 'Нужно снизить мощь до',
    tip_power_shed: 'Сбросить мощи',
    tip_t4: 'T4 в госпиталь', tip_t5: 'T5',
    manual_power: 'Мощь с заполнением госпиталя',
    pass_after: 'Паспортов',
    powCol: 'Мощь', passCol: 'Паспортов',
    cal: '📅 Calendar',
    troops_die: 'погибнет',
    ok_text: 'Вмещается в госпиталь',
  },
  en: {
    back: '← Home', title: 'Passport Calculator — Rise of Kingdoms',
    power: 'Power', target: 'Target (passports)', hosp: 'Hospital',
    current: 'Current', targetLabel: 'Target',
    tip_need_power: 'Reduce power to',
    tip_power_shed: 'Power to shed',
    tip_t4: 'T4 to hospital', tip_t5: 'T5',
    manual_power: 'Power with hospital',
    pass_after: 'Passports',
    powCol: 'Power', passCol: 'Passports',
    cal: '📅 Calendar',
    troops_die: 'will die',
    ok_text: 'Fits in hospital',
  },
};

const det = navigator.language.startsWith('ru') ? 'ru' : 'en';
let lang = localStorage.getItem('lang') || det;
function t(k) { return LANG[lang][k] || k; }
function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (LANG[lang][k]) el.textContent = LANG[lang][k];
  });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.documentElement.lang = lang;
}
document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', () => { lang = b.dataset.lang; localStorage.setItem('lang', lang); applyLang(); calc(); });
});
applyLang();

const pi = document.getElementById('powerInput');
const ts = document.getElementById('targetSelect');

// Populate target dropdown
const allPassValues = [];
for (const t of THR) { if (!allPassValues.includes(t.p)) allPassValues.push(t.p); }
for (let extra = 35; extra <= 300; extra += 5) { allPassValues.push(extra); }
for (const v of allPassValues) {
  const opt = document.createElement('option');
  opt.value = v; opt.textContent = v;
  ts.appendChild(opt);
}

pi.addEventListener('input', function() {
  const r = this.value.replace(/\s/g, '').replace(/[^\d]/g, '');
  this.value = r ? fn(parseInt(r)) : '';
  calc();
});
pi.addEventListener('focus', function() { this.select(); });
ts.addEventListener('change', calc);
document.getElementById('hospCap').addEventListener('input', calc);
document.getElementById('t4Count').addEventListener('input', calc);
document.getElementById('t5Count').addEventListener('input', calc);

function calc() {
  const raw = pi.value.replace(/\s/g, '');
  const powerRaw = parseFloat(raw) || 0;
  const pm = powerRaw / 1000000;
  const curPass = pass(pm);
  const tgt = parseInt(ts.value) || 1;
  const cap = parseInt(document.getElementById('hospCap').value) || 0;
  const t4m = parseInt(document.getElementById('t4Count').value) || 0;
  const t5m = parseInt(document.getElementById('t5Count').value) || 0;

  document.getElementById('curPass').textContent = curPass;
  document.getElementById('tgtPass').textContent = tgt;

  const maxP = maxPowerForPass(tgt);
  const tb = document.getElementById('tipBox');
  const dw = document.getElementById('deathWarn');
  const ow = document.getElementById('okWarn');

  if (tgt >= curPass) {
    tb.style.display = 'none';
  } else {
    tb.style.display = 'block';
    document.getElementById('targetMaxPower').textContent = fn(maxP);
    const shed = powerRaw - maxP;
    document.getElementById('powerShed').textContent = fn(shed);

    const t4need = Math.ceil(shed / P4);
    const t5need = Math.ceil(shed / P5);
    document.getElementById('tipT4').textContent = fn(t4need);
    document.getElementById('tipT5').textContent = fn(t5need);

    // Hospital check against recommendation
    if (cap > 0) {
      if (t4need > cap) {
        dw.classList.add('visible');
        document.getElementById('deathText').textContent =
          fn(t4need - cap) + ' ' + t('troops_die');
        ow.classList.remove('visible');
      } else {
        dw.classList.remove('visible');
        ow.classList.add('visible');
        document.getElementById('okText').textContent = t('ok_text');
      }
    } else {
      dw.classList.remove('visible');
      ow.classList.remove('visible');
    }
  }

  // Manual T4/T5 check
  const mb = document.getElementById('manualBox');
  if (t4m > 0 || t5m > 0) {
    const hp = t4m * P4 + t5m * P5;
    const totalTroops = t4m + t5m;
    const effRaw = Math.max(0, powerRaw - hp);
    document.getElementById('manualEffPower').textContent = fn(effRaw);
    document.getElementById('manualPass').textContent = pass(effRaw / 1000000);
    mb.style.display = 'block';
    if (cap > 0 && totalTroops > cap) {
      dw.classList.add('visible');
      document.getElementById('deathText').textContent =
        fn(totalTroops - cap) + ' ' + t('troops_die') + ' (T4+T5)';
      ow.classList.remove('visible');
    }
  } else {
    mb.style.display = 'none';
  }

  render(pm, curPass);
}

function render(pm, curP) {
  const tb = document.getElementById('tableBody');
  let h = '';
  for (const t of THR) {
    const a = pm < t.max ? 'active' : '';
    const style = a ? 'color:var(--neon-yellow);font-weight:700;' : '';
    h += `<tr><td style="padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.06);text-align:left;${style}">${fn((t.max-5)*1000000)}–${fn(t.max*1000000-1)}</td><td style="padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.06);text-align:right;${style}">${t.p}</td></tr>`;
  }
  // Show current additional rows
  if (pm >= 60) {
    const a60 = pm < 65 ? 'active' : '';
    const s60 = a60 ? 'color:var(--neon-yellow);font-weight:700;' : '';
    h += `<tr><td style="padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.06);text-align:left;${s60}">${fn(60000000)}–${fn(64999999)}</td><td style="padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.06);text-align:right;${s60}">30</td></tr>`;
    for (let m = 65; m <= pm + 5; m += 5) {
      const pp = pass(m);
      const a = pm < m + 5 && pm >= m ? 'active' : '';
      const s = a ? 'color:var(--neon-yellow);font-weight:700;' : '';
      h += `<tr><td style="padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.06);text-align:left;${s}">${fn((m-5)*1000000)}–${fn(m*1000000-1)}</td><td style="padding:4px 8px;border-bottom:1px solid rgba(255,230,0,0.06);text-align:right;${s}">${pp}</td></tr>`;
    }
  }
  tb.innerHTML = h;
}

calc();
</script>
</body>
</html>
