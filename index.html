<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adamantizator — Главная</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --neon-yellow: #ffe600;
  --neon-gold: #ffdd00;
  --neon-amber: #ffb300;
  --neon-cyan: #00f0ff;
  --neon-red: #ff1030;
  --dark-bg: #0a0a0f;
  --panel-bg: #12121a;
  --card-bg: #1a1a2e;
  --border-glow: rgba(255, 230, 0, 0.3);
  --text-primary: #fff8dc;
  --text-dim: #e0d8b0;
  --text-muted: #c0b080;
  --font-display: 'Orbitron', monospace;
  --font-body: 'Rajdhani', sans-serif;
  --font-mono: 'Fira Code', monospace;
}

body {
  background: var(--dark-bg);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    linear-gradient(rgba(255, 230, 0, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 230, 0, 0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
  pointer-events: none;
  z-index: 1;
}

.app {
  position: relative;
  z-index: 2;
  max-width: 700px;
  width: 90%;
  text-align: center;
  padding: 20px;
}

.header {
  margin-bottom: 40px;
}
.header h1 {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 6px;
  background: linear-gradient(135deg, var(--neon-yellow), var(--neon-amber));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 40px rgba(255, 230, 0, 0.5));
}
.header .subtitle {
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 8px;
  color: var(--text-dim);
  margin-top: 8px;
  text-transform: uppercase;
}
.glitch-line {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-yellow), var(--neon-gold), transparent);
  margin: 16px auto 0;
  max-width: 400px;
  box-shadow: 0 0 20px rgba(255, 230, 0, 0.4);
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;
}

.card {
  display: block;
  width: 100%;
  max-width: 480px;
  background: var(--panel-bg);
  border: 1px solid var(--border-glow);
  border-radius: 6px;
  padding: 28px 24px;
  text-decoration: none;
  color: var(--text-primary);
  transition: all 0.25s ease;
  box-shadow: 0 0 20px rgba(255, 230, 0, 0.06), inset 0 0 30px rgba(255, 230, 0, 0.03);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(255,230,0,0.08), transparent 60%);
  opacity: 0;
  transition: opacity 0.25s ease;
}

.card:hover {
  border-color: var(--neon-yellow);
  box-shadow: 0 0 40px rgba(255, 230, 0, 0.15), inset 0 0 40px rgba(255, 230, 0, 0.05);
  transform: translateY(-3px);
}

.card:hover::before { opacity: 1; }

.card-icon {
  font-size: 2.2rem;
  margin-bottom: 10px;
  position: relative;
}

.card-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 6px;
  position: relative;
}

.card-desc {
  font-family: var(--font-body);
  font-size: 0.95rem;
  color: var(--text-dim);
  line-height: 1.4;
  position: relative;
}

.card .tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 1px;
  padding: 3px 8px;
  border: 1px solid var(--border-glow);
  border-radius: 2px;
  color: var(--text-muted);
  margin-top: 8px;
  position: relative;
}

.card-adamantizator .card-title { color: var(--neon-yellow); }
.card-healcalc .card-title { color: var(--neon-cyan); }

.footer {
  margin-top: 40px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  letter-spacing: 1px;
}

@keyframes flicker {
  0%, 88%, 92%, 96%, 100% { opacity: 1; }
  90%, 94% { opacity: 0.85; }
}
.flicker { animation: flicker 4s infinite; }
.flicker-glow { animation: flicker-glow 4s infinite; }

/* LANG SWITCHER */
.lang-switch {
  position: absolute;
  top: 20px; right: 20px;
  display: flex;
  gap: 2px;
  z-index: 10;
}
.lang-btn {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 3px 8px;
  background: var(--input-bg);
  border: 1px solid rgba(255, 230, 0, 0.2);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.lang-btn:first-child { border-radius: 3px 0 0 3px; }
.lang-btn:last-child { border-radius: 0 3px 3px 0; }
.lang-btn.active {
  background: var(--neon-yellow);
  color: #000;
  border-color: var(--neon-yellow);
}
.lang-btn:hover:not(.active) { border-color: var(--neon-yellow); }

/* CYBER BANNER (Small Logo) */
.cyber-banner-small {
  width: 100%;
  max-width: 160px;
  margin: 0 auto 20px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid rgba(255, 230, 0, 0.3);
  box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05);
  position: relative;
  background: var(--panel-bg);
  padding: 10px;
}
.cyber-banner-small::before {
  content: '';
  position: absolute;
  top: -5px; left: -5px; right: -5px; bottom: -5px;
  border-radius: 50%;
  background: linear-gradient(45deg, rgba(255, 230, 0, 0.1), transparent, rgba(255, 230, 0, 0.1));
  animation: rotate 8s linear infinite;
  pointer-events: none;
}
.cyber-banner-small img {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 50%;
  position: relative;
  z-index: 1;
}
.cyber-banner-small::after {
  content: '';
  position: absolute;
  top: 10px; left: 10px; right: 10px; bottom: 10px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255, 230, 0, 0.1), transparent 45%, transparent 55%, rgba(255, 230, 0, 0.03));
  animation: shimmer 6s linear infinite;
  pointer-events: none;
  z-index: 2;
}

@keyframes shimmer {
  to { transform: rotate(360deg); }
}
@keyframes rotate {
  to { transform: rotate(360deg); }
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--dark-bg); }
::-webkit-scrollbar-thumb { background: var(--neon-yellow); border-radius: 3px; }

@media (max-width: 480px) {
  .header h1 { font-size: 1.6rem; letter-spacing: 3px; }
  .card { padding: 20px 16px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="header flicker" style="position:relative;">
    <div class="lang-switch">
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <h1>ADAMANTIZATOR</h1>
    <div class="subtitle" data-i18n="subtitle">Tools for Rise of Kingdoms</div>
    <div class="glitch-line"></div>
  </header>

  <!-- CYBER BANNER (Small Logo) -->
  <div class="cyber-banner-small flicker-glow">
    <img src="logo.png" alt="ADAMANTIZATOR Logo" loading="lazy" onerror="this.style.display='none'">
  </div>

  <div class="cards">
    <a class="card card-adamantizator" href="adamantizator.html">
      <div class="card-icon">📊</div>
      <div class="card-title">Adamantizator</div>
      <div class="card-desc" data-i18n="card1_desc">Расчёт ДКП по загруженной Excel-таблице из игры</div>
      <div class="tag" data-i18n="card1_tag">Загрузка .xlsx · Фильтр · Поиск</div>
    </a>

    <a class="card card-healcalc" href="healcalc.html">
      <div class="card-icon">⏳</div>
      <div class="card-title">Heal Calculator</div>
      <div class="card-desc" data-i18n="card2_desc">Расчёт времени лечения войск T4 / T5 с учётом бонусов и ручек</div>
      <div class="tag" data-i18n="card2_tag">T4 · T5 · Скорость · Ресурсы</div>
    </a>
  </div>

  <div class="footer">
    <span>v2.0</span>
    <span style="margin:0 8px;">|</span>
    <span>Rise of Kingdoms</span>
  </div>
</div>

<script>
const LANG = {
  ru: {
    subtitle: 'Tools for Rise of Kingdoms',
    card1_desc: 'Расчёт ДКП по загруженной Excel-таблице из игры',
    card1_tag: 'Загрузка .xlsx · Фильтр · Поиск',
    card2_desc: 'Расчёт времени лечения войск T4 / T5 с учётом бонусов и ручек',
    card2_tag: 'T4 · T5 · Скорость · Ресурсы',
    card2_tag_eng: 'T4 · T5 · Speed · Resources',
  },
  en: {
    subtitle: 'Tools for Rise of Kingdoms',
    card1_desc: 'DKP calculation from in-game Excel export',
    card1_tag: 'Load .xlsx · Filter · Search',
    card2_desc: 'T4 / T5 troop healing time with bonuses and handles',
    card2_tag: 'T4 · T5 · Speed · Resources',
  },
};

const detected = navigator.language.startsWith('ru') ? 'ru' : 'en';
let lang = localStorage.getItem('lang') || detected;
window.lang = lang;

function t(key) { return LANG[lang][key] || key; }

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (LANG[lang][key]) el.textContent = LANG[lang][key];
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  document.documentElement.lang = lang;
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    lang = btn.dataset.lang;
    window.lang = lang;
    localStorage.setItem('lang', lang);
    applyLang();
  });
});

applyLang();
</script>
</body>
</html>
