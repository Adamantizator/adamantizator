<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="page_title">Book of Covenant Calculator — Rise of Kingdoms</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;600&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--neon-yellow:#ffe600;--neon-gold:#ffdd00;--neon-amber:#ffb300;--neon-red:#ff1030;--neon-green:#00ff88;--dark-bg:#0a0a0f;--panel-bg:#12121a;--input-bg:#0d0d1a;--border-glow:rgba(255,230,0,0.3);--text-primary:#fff8dc;--text-dim:#e0d8b0;--text-muted:#c0b080;--font-display:'Orbitron',monospace;--font-body:'Rajdhani',sans-serif;--font-mono:'Fira Code',monospace}
body{background:var(--dark-bg);color:var(--text-primary);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(rgba(255,230,0,0.05)1px,transparent 1px),linear-gradient(90deg,rgba(255,230,0,0.05)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12)2px,rgba(0,0,0,0.12)4px);pointer-events:none;z-index:1}
.app{position:relative;z-index:2;max-width:700px;margin:0 auto;padding:20px}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-family:var(--font-display);font-size:2rem;font-weight:900;text-transform:uppercase;letter-spacing:4px;background:linear-gradient(135deg,var(--neon-yellow),var(--neon-amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px rgba(255,230,0,0.4))}
.glitch-line{height:2px;margin:12px 0 0;background:linear-gradient(90deg,transparent,var(--neon-yellow),var(--neon-gold),transparent);box-shadow:0 0 20px rgba(255,230,0,0.4)}
.header .subtitle{font-family:var(--font-display);font-size:0.7rem;letter-spacing:6px;color:var(--text-dim);margin-top:6px;text-transform:uppercase}
.flicker-glow-text{animation:flicker-glow-text 4s infinite}
@keyframes flicker-glow-text{0%,82%{-webkit-text-stroke:0 transparent}86%{-webkit-text-stroke:1.5px #ff1030}90%{-webkit-text-stroke:0 transparent}94%{-webkit-text-stroke:1.5px #ff1030}98%{-webkit-text-stroke:0 transparent}100%{-webkit-text-stroke:0 transparent}}
.lang-switch{position:fixed;top:2px;right:8px;display:flex;gap:2px;z-index:10}
.lang-btn{font-family:var(--font-mono);font-size:0.6rem;padding:3px 8px;background:var(--input-bg);border:1px solid rgba(255,230,0,0.2);color:var(--text-muted);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:1px}
.lang-btn:first-child{border-radius:3px 0 0 3px}
.lang-btn:last-child{border-radius:0 3px 3px 0}
.lang-btn.active{background:var(--neon-yellow);color:#000;border-color:var(--neon-yellow)}
.lang-btn:hover:not(.active){border-color:var(--neon-yellow)}
.cal-btn{font-family:var(--font-display);font-size:0.6rem;padding:3px 8px;background:var(--input-bg);border:1px solid rgba(255,230,0,0.2);color:var(--text-muted);cursor:pointer;text-decoration:none;text-transform:uppercase;letter-spacing:1px;transition:all 0.2s;margin-right:2px}
.cal-btn:hover{border-color:var(--neon-yellow);color:var(--neon-yellow)}
.cyber-banner-small{width:100%;max-width:120px;margin:0 auto 20px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,230,0,0.3);box-shadow:0 0 30px rgba(255,230,0,0.2),inset 0 0 40px rgba(255,230,0,0.05);position:relative;background:var(--panel-bg);padding:8px}
.cyber-banner-small::before{content:'';position:absolute;top:-5px;left:-5px;right:-5px;bottom:-5px;border-radius:50%;background:linear-gradient(45deg,rgba(255,230,0,0.1),transparent,rgba(255,230,0,0.1));animation:rotate 8s linear infinite;pointer-events:none}
.cyber-banner-small img{display:block;width:100%;height:auto;border-radius:50%;position:relative;z-index:1}
.cyber-banner-small::after{content:'';position:absolute;top:8px;left:8px;right:8px;bottom:8px;border-radius:50%;background:linear-gradient(135deg,rgba(255,230,0,0.1),transparent 45%,transparent 55%,rgba(255,230,0,0.03));animation:shimmer 6s linear infinite;pointer-events:none;z-index:2}
@keyframes shimmer{to{transform:rotate(360deg)}}@keyframes rotate{to{transform:rotate(360deg)}}
.panel{background:var(--panel-bg);border:1px solid var(--border-glow);border-radius:4px;padding:20px;margin-bottom:16px;box-shadow:0 0 20px rgba(255,230,0,0.06),inset 0 0 30px rgba(255,230,0,0.03)}
label{font-family:var(--font-display);font-size:0.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:4px}
input,select{font-family:var(--font-body);font-size:1rem;padding:8px 12px;background:var(--input-bg);border:1px solid rgba(255,230,0,0.25);color:var(--text-primary);border-radius:3px;outline:none;transition:border-color 0.2s;width:100%}
input:focus,select:focus{border-color:var(--neon-yellow);box-shadow:0 0 15px rgba(255,230,0,0.15)}
select{cursor:pointer}select option{background:var(--dark-bg);color:var(--text-primary)}
.row{display:flex;flex-wrap:wrap;gap:12px;align-items:end}
.col{display:flex;flex-direction:column;gap:6px;flex:1;min-width:130px}
.result-panel{text-align:center;padding:24px 20px}
.result-value{font-family:var(--font-display);font-size:2.5rem;font-weight:900;color:var(--neon-yellow);text-shadow:0 0 30px rgba(255,230,0,0.3);margin:4px 0}
.result-value.small{font-size:1.6rem}
.result-label{font-family:var(--font-display);font-size:0.65rem;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px}
.progress-bar-bg{width:100%;height:14px;background:var(--input-bg);border:1px solid rgba(255,230,0,0.2);border-radius:3px;overflow:hidden;margin:12px 0}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--neon-yellow),var(--neon-amber));transition:width 0.3s ease;border-radius:2px}
.progress-label{font-family:var(--font-mono);font-size:0.75rem;color:var(--text-dim)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:0.75rem}
th{font-family:var(--font-display);font-size:0.5rem;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;padding:6px 8px;border-bottom:1px solid rgba(255,230,0,0.15);text-align:right}
th:first-child{text-align:left}
td{padding:6px 8px;border-bottom:1px solid rgba(255,230,0,0.06);text-align:right}
td:first-child{text-align:left}
tr.current td{color:var(--neon-yellow);font-weight:700}
tr.target td{color:var(--neon-green);font-weight:700}
tr.between td{color:var(--neon-amber)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--dark-bg)}
::-webkit-scrollbar-thumb{background:var(--neon-yellow);border-radius:3px}
@media(max-width:768px){.header{padding-top:36px}.header h1{font-size:1.4rem;letter-spacing:2px}.app{padding:10px}.panel{padding:12px}.row{gap:10px}.col{min-width:100px}.result-value{font-size:2rem}.result-value.small{font-size:1.3rem}}
</style>
</head>
<body>
<div class="lang-switch">
  <a href="calendar.html" class="cal-btn">📅</a>
  <button class="lang-btn" data-lang="ru">RU</button>
  <button class="lang-btn" data-lang="en">EN</button>
</div>
<div class="app">
  <header class="header">
    <div style="text-align:left;margin-bottom:4px">
      <a href="index.html" style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);text-decoration:none;letter-spacing:1px" data-i18n="back_home">← Главная</a>
    </div>
    <h1 class="flicker-glow-text" data-i18n="h1">COVENANT</h1>
    <div class="subtitle" data-i18n="subtitle">Book of Covenant Calculator</div>
    <div class="glitch-line"></div>
  </header>
  <div class="cyber-banner-small flicker-glow"><img src="logo.png" alt="COVENANT" loading="lazy" onerror="this.style.display='none'"></div>

  <div class="panel">
    <div class="row">
      <div class="col"><label data-i18n="lvl_label">Уровень</label><select id="fromLvl"></select></div>
      <div class="col"><label data-i18n="target_label">Цель</label><select id="toLvl"></select></div>
      <div class="col"><label data-i18n="have_label">Книг в наличии</label><input type="number" id="booksHave" value="0" min="0"></div>
    </div>
  </div>

  <div class="panel result-panel">
    <div class="result-value" id="booksNeed">0</div>
    <div class="result-label" data-i18n="need_label">Нужно книг</div>
    <div class="result-value small" id="gemsNeed">0</div>
    <div class="result-label" data-i18n="gems_label">Или в гемах</div>
    <div style="margin-top:6px;">
      <span class="result-label" style="font-size:0.55rem"><span data-i18n="total_need">Требуется всего</span>: <span id="totalNeed" style="font-family:var(--font-display);color:var(--neon-amber)">0</span></span>
      <span class="result-label" style="font-size:0.55rem;margin-left:12px;"><span data-i18n="have_display">Есть</span>: <span id="haveDisplay" style="font-family:var(--font-display);color:var(--neon-amber)">0</span></span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0%</div>
  </div>

  <div class="panel" style="padding:20px 20px 4px">
    <div class="table-wrap">
      <table>
        <thead><tr><th data-i18n="th_lvl">Уровень</th><th data-i18n="th_cost">Книг на уровень</th><th data-i18n="th_total">Всего книг</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const BOOKS = [0,0,2,2,8,15,20,30,40,50,70,80,100,125,150,300,500,700,900,1200,1500,1800,2000,2500,3000,5000];
function fn(n){return Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')}

const LANG={
  ru:{
    page_title:'Калькулятор книг соглашений — Rise of Kingdoms',
    h1:'ЗАМОК',
    back_home:'← Главная',
    subtitle:'Книги Соглашений / Book of Covenant',
    lvl_label:'Уровень',
    target_label:'Цель',
    have_label:'Книг в наличии',
    need_label:'Нужно книг',
    gems_label:'Или в гемах',
    total_need:'Требуется всего',
    have_display:'Есть',
    th_lvl:'Уровень',
    th_cost:'Книг на уровень',
    th_total:'Всего книг',
    lvl_prefix:'Ур.',
  },
  en:{
    page_title:'Book of Covenant Calculator — Rise of Kingdoms',
    h1:'COVENANT',
    back_home:'← Home',
    subtitle:'Book of Covenant / Книги Соглашений',
    lvl_label:'Level',
    target_label:'Target',
    have_label:'Books on hand',
    need_label:'Books needed',
    gems_label:'Or in gems',
    total_need:'Total required',
    have_display:'Have',
    th_lvl:'Level',
    th_cost:'Books per level',
    th_total:'Total books',
    lvl_prefix:'Lv.',
  },
};

const detected=navigator.language.startsWith('ru')?'ru':'en';
let lang=localStorage.getItem('lang')||detected;
window.lang=lang;
function t(key){return LANG[lang][key]||key}

function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.dataset.i18n;
    if(LANG[lang][key])el.textContent=LANG[lang][key];
  });
  document.querySelectorAll('.lang-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.lang===lang));
  document.documentElement.lang=lang;
}

document.querySelectorAll('.lang-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{lang=btn.dataset.lang;window.lang=lang;localStorage.setItem('lang',lang);applyLang();fillLvlOptions();calc()});
});
applyLang();

const fromS=document.getElementById('fromLvl');
const toS=document.getElementById('toLvl');
const haveI=document.getElementById('booksHave');

for(let i=1;i<=25;i++){
  const o1=document.createElement('option');o1.value=i;o1.textContent=t('lvl_prefix')+' '+i;fromS.appendChild(o1);
  const o2=document.createElement('option');o2.value=i;o2.textContent=t('lvl_prefix')+' '+i;toS.appendChild(o2);
}
fromS.value=1;toS.value=25;

function fillLvlOptions(){
  fromS.options.forEach((o,i)=>o.textContent=t('lvl_prefix')+' '+i);
  toS.options.forEach((o,i)=>o.textContent=t('lvl_prefix')+' '+i);
}

function calc(){
  const f=parseInt(fromS.value)||1;
  const t=parseInt(toS.value)||1;
  const h=parseInt(haveI.value)||0;
  if(t<f){toS.value=f;calc();return}
  let total=0;
  for(let i=f+1;i<=t;i++)total+=BOOKS[i];
  const need=Math.max(0,total-h);
  document.getElementById('booksNeed').textContent=fn(need);
  document.getElementById('totalNeed').textContent=fn(total);
  document.getElementById('haveDisplay').textContent=fn(h);
  document.getElementById('gemsNeed').textContent=fn(need*10);
  const pct=total>0?Math.min(100,h/total*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=fn(Math.floor(h))+' / '+fn(total)+' ('+pct.toFixed(1)+'%)';
  render(f,t);
}
function render(f,t){
  const tb=document.getElementById('tableBody');let h='';
  let cum=0;
  for(let i=1;i<=25;i++){
    cum+=BOOKS[i];
    let cls='';
    if(i===t)cls='target';
    else if(i===f)cls='current';
    else if(i>f&&i<t)cls='between';
    const cost=BOOKS[i]>0?fn(BOOKS[i]):'—';
    h+=`<tr class="${cls}"><td>${i}</td><td>${cost}</td><td>${fn(cum)}</td></tr>`;
  }
  tb.innerHTML=h;
}
fromS.addEventListener('change',calc);
toS.addEventListener('change',calc);
haveI.addEventListener('input',calc);
calc();
</script>
</body>
</html>
