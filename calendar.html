<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="page_title">Events Calendar — Rise of Kingdoms</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --neon-yellow: #ffe600;
  --neon-gold: #ffdd00;
  --neon-amber: #ffb300;
  --neon-red: #ff1030;
  --neon-green: #00ff88;
  --neon-cyan: #00f0ff;
  --dark-bg: #0a0a0f;
  --panel-bg: #12121a;
  --card-bg: #1a1a2e;
  --input-bg: #0d0d1a;
  --border-glow: rgba(255, 230, 0, 0.3);
  --text-primary: #fff8dc;
  --text-dim: #e0d8b0;
  --text-muted: #c0b080;
  --font-display: 'Orbitron', monospace;
  --font-body: 'Rajdhani', sans-serif;
  --font-mono: 'Fira Code', monospace;
}

body {
  background: var(--dark-bg);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    linear-gradient(rgba(255, 230, 0, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 230, 0, 0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
  pointer-events: none;
  z-index: 1;
}

.app { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 20px; }

.header { text-align: center; padding: 30px 0 20px; }
.header h1 {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--neon-yellow), var(--neon-amber));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 30px rgba(255, 230, 0, 0.4));
}
.header .subtitle {
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 6px;
  color: var(--text-dim);
  margin-top: 6px;
  text-transform: uppercase;
}
.glitch-line {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-yellow), var(--neon-gold), transparent);
  margin: 12px 0 0;
  box-shadow: 0 0 20px rgba(255, 230, 0, 0.4);
}

@keyframes flicker {
  0%, 82% { opacity: 1; }
  86% { opacity: 1; }
  90% { opacity: 0.85; }
  94% { opacity: 1; }
  98% { opacity: 0.85; }
  100% { opacity: 1; }
}
.flicker { animation: flicker 4s infinite; }

@keyframes flicker-glow-text {
  0%, 82% { -webkit-text-stroke: 0 transparent; }
  86% { -webkit-text-stroke: 1.5px #ff1030; }
  90% { -webkit-text-stroke: 0 transparent; }
  94% { -webkit-text-stroke: 1.5px #ff1030; }
  98% { -webkit-text-stroke: 0 transparent; }
  100% { -webkit-text-stroke: 0 transparent; }
}
.flicker-glow-text { animation: flicker-glow-text 4s infinite; }

@keyframes flicker-glow {
  0%, 82% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05); }
  86% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05), 0 0 15px rgba(255, 16, 48, 0.5), 0 0 40px rgba(255, 16, 48, 0.2); }
  90% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05); }
  94% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05), 0 0 15px rgba(255, 16, 48, 0.5), 0 0 40px rgba(255, 16, 48, 0.2); }
  98% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05); }
  100% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05); }
}
.flicker-glow { animation: flicker-glow 4s infinite; }

.lang-switch {
  position: fixed; top: 4px; right: 8px;
  display: flex; gap: 2px; z-index: 10;
}
.lang-btn {
  font-family: var(--font-mono); font-size: 0.6rem;
  padding: 3px 8px; background: var(--input-bg);
  border: 1px solid rgba(255, 230, 0, 0.2);
  color: var(--text-muted); cursor: pointer;
  transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
}
.lang-btn:first-child { border-radius: 3px 0 0 3px; }
.lang-btn:last-child { border-radius: 0 3px 3px 0; }
.lang-btn.active { background: var(--neon-yellow); color: #000; border-color: var(--neon-yellow); }
.lang-btn:hover:not(.active) { border-color: var(--neon-yellow); }

.cyber-banner-small {
  width: 100%; max-width: 120px;
  margin: 0 auto 20px; border-radius: 50%; overflow: hidden;
  border: 2px solid rgba(255, 230, 0, 0.3);
  box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05);
  position: relative; background: var(--panel-bg); padding: 8px;
}
.cyber-banner-small::before {
  content: ''; position: absolute;
  top: -5px; left: -5px; right: -5px; bottom: -5px; border-radius: 50%;
  background: linear-gradient(45deg, rgba(255, 230, 0, 0.1), transparent, rgba(255, 230, 0, 0.1));
  animation: rotate 8s linear infinite; pointer-events: none;
}
.cyber-banner-small img {
  display: block; width: 100%; height: auto; border-radius: 50%;
  position: relative; z-index: 1;
}
.cyber-banner-small::after {
  content: ''; position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(255, 230, 0, 0.1), transparent 45%, transparent 55%, rgba(255, 230, 0, 0.03));
  animation: shimmer 6s linear infinite; pointer-events: none; z-index: 2;
}
@keyframes shimmer { to { transform: rotate(360deg); } }
@keyframes rotate { to { transform: rotate(360deg); } }

.panel {
  background: var(--panel-bg);
  border: 1px solid var(--border-glow);
  border-radius: 4px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 0 20px rgba(255, 230, 0, 0.06), inset 0 0 30px rgba(255, 230, 0, 0.03);
}
.panel-title {
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--neon-yellow);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-title::before { content: '>'; color: var(--neon-gold); font-weight: 700; }

/* NAVIGATION */
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
}
.nav-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-btn {
  font-family: var(--font-display);
  font-size: 0.8rem;
  padding: 6px 12px;
  background: var(--input-bg);
  border: 1px solid rgba(255, 230, 0, 0.2);
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 3px;
  user-select: none;
}
.nav-btn:hover {
  border-color: var(--neon-yellow);
  box-shadow: 0 0 15px rgba(255, 230, 0, 0.1);
}
.nav-label {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--neon-yellow);
  min-width: 90px;
  text-align: center;
  letter-spacing: 2px;
}
.nav-label-month {
  min-width: 130px;
}
.utc-display {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  background: var(--input-bg);
  padding: 6px 12px;
  border-radius: 3px;
  border: 1px solid rgba(255, 230, 0, 0.1);
}
.click-hint {
  font-family: var(--font-display);
  font-size: 0.55rem;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 10px;
  text-transform: uppercase;
}

/* CALENDAR GRID */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-bottom: 8px;
}
.cal-dow {
  font-family: var(--font-display);
  font-size: 0.6rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: center;
  padding: 8px 2px;
  border-bottom: 1px solid rgba(255, 230, 0, 0.1);
}
.cal-cell {
  aspect-ratio: 1;
  background: var(--input-bg);
  border: 1px solid rgba(255, 230, 0, 0.08);
  border-radius: 3px;
  padding: 3px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  position: relative;
  min-height: 64px;
  overflow: hidden;
}
.cal-cell:hover {
  border-color: var(--neon-yellow);
  box-shadow: 0 0 12px rgba(255, 230, 0, 0.1);
}
.cal-cell.other-month {
  opacity: 0.3;
  pointer-events: none;
}
.cal-cell.today {
  border-color: var(--neon-yellow);
  box-shadow: 0 0 15px rgba(255, 230, 0, 0.15);
}
.cal-cell .day-num {
  font-family: var(--font-display);
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: auto;
}
.cal-cell .event-labels {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: 2px;
}
.cal-cell .event-label {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  font-weight: 600;
  color: #000;
  padding: 1px 3px;
  border-radius: 2px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
  letter-spacing: 0.5px;
  border-radius: 1px;
  flex-shrink: 0;
}

/* DETAIL PANEL */
.detail-panel {
  display: none;
  margin-top: 8px;
}
.detail-panel.visible {
  display: block;
}
.detail-panel .detail-date {
  font-family: var(--font-display);
  font-size: 0.8rem;
  letter-spacing: 2px;
  color: var(--neon-yellow);
  margin-bottom: 10px;
}
.detail-panel .detail-close {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  cursor: pointer;
  background: none;
  border: 1px solid rgba(255, 230, 0, 0.15);
  padding: 3px 10px;
  border-radius: 3px;
  margin-bottom: 10px;
  transition: all 0.2s;
}
.detail-panel .detail-close:hover {
  border-color: var(--neon-yellow);
  color: var(--text-primary);
}
.detail-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-left: 3px solid transparent;
  margin-bottom: 4px;
  background: rgba(255,255,255,0.02);
  border-radius: 2px;
}
.detail-item .detail-color {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.detail-item .detail-name {
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
}
.detail-item .detail-range {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  margin-left: auto;
  white-space: nowrap;
}
.detail-empty {
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: var(--text-muted);
  text-align: center;
  padding: 20px;
}

/* EXPLANATIONS */
.explanations-panel {
  margin-top: 16px;
}
.expl-title {
  font-family: var(--font-display);
  font-size: 0.65rem;
  letter-spacing: 2px;
  color: var(--neon-yellow);
  margin-bottom: 12px;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
.expl-title::before {
  content: '▼';
  font-size: 0.5rem;
  transition: transform 0.2s;
}
.expl-title.collapsed::before {
  transform: rotate(-90deg);
}
.expl-content {
  display: block;
}
.expl-content.collapsed {
  display: none;
}
.expl-items {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.expl-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border: 1px solid;
  border-radius: 3px;
  background: rgba(255,255,255,0.02);
}
.expl-item .expl-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.expl-item .expl-name {
  font-family: var(--font-display);
  font-size: 0.6rem;
  letter-spacing: 1px;
  color: var(--text-primary);
  white-space: nowrap;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--dark-bg); }
::-webkit-scrollbar-thumb { background: var(--neon-yellow); border-radius: 3px; }

@media (max-width: 768px) {
  .header { padding-top: 36px; }
  .header h1 { font-size: 1.3rem; letter-spacing: 2px; }
  .cal-cell { min-height: 50px; padding: 2px; }
  .cal-cell .day-num { font-size: 0.6rem; }
  .cal-cell .event-label { font-size: 0.4rem; padding: 1px 2px; }
  .cal-dow { font-size: 0.5rem; padding: 4px 1px; }
  .nav-label { font-size: 1rem; min-width: 70px; }
  .nav-label-month { min-width: 100px; }
  .nav-btn { font-size: 0.7rem; padding: 4px 8px; }
  .utc-display { font-size: 0.55rem; padding: 4px 8px; }
  .cal-nav { gap: 6px; }
  .detail-item { flex-wrap: wrap; }
  .detail-item .detail-range { white-space: normal; margin-left: 24px; }
  .app { padding: 10px; }
  .panel { padding: 12px; }
  .explanations-panel .expl-item { padding: 3px 7px; }
  .explanations-panel .expl-name { font-size: 0.5rem; }
  .explanations-panel .expl-dot { width: 7px; height: 7px; }
}
@media (max-width: 480px) {
  .cal-cell { min-height: 28px; padding: 1px; overflow: hidden; }
  .cal-cell .day-num { font-size: 0.45rem; }
  .cal-cell .event-labels { flex-direction: row; flex-wrap: wrap; gap: 1px; margin-top: 1px; }
  .cal-cell .event-label { width: 5px; height: 5px; padding: 0; font-size: 0; overflow: hidden; border-radius: 1px; flex-shrink: 0; }
  .cal-dow { font-size: 0.4rem; padding: 2px 0; }
  .nav-label { font-size: 0.8rem; min-width: 50px; }
  .nav-label-month { min-width: 70px; }
  .nav-btn { font-size: 0.6rem; padding: 3px 5px; }
  .utc-display { font-size: 0.45rem; padding: 3px 5px; }
  .cal-grid { gap: 1px; }
}
</style>
</head>

</div>

  <!-- EXPLANATIONS -->
  <div class="panel explanations-panel">

    <div class="expl-content" id="explContent"></div>
  </div>
</div>

  });

    localStorage.setItem('lang', lang);

    render();

// ===================== EVENT ENGINE =====================
function getEventsForMonth(year, month) {
  const results = [];
  const monthStart = new Date(year, month, 1);
  const monthEnd = new Date(year, month + 1, 0, 23, 59, 59);

  for (const def of EVENT_DEFS) {
    for (const pat of def.patterns) {
      const startDate = new Date(pat.start + 'T00:00:00');
      const freqMs = pat.freqWeeks * 7 * 24 * 60 * 60 * 1000;
      const durMs = pat.duration * 24 * 60 * 60 * 1000;

      // Calculate first occurrence that could overlap with this month
      const startTs = startDate.getTime();
      const monthStartTs = monthStart.getTime();

      if (startTs > monthEnd.getTime()) continue;

      // Find n such that startDate + n*freq is near monthStart
      const diff = monthStartTs - startTs;
      let n = diff > 0 ? Math.floor(diff / freqMs) : 0;
      if (n > 0) n--; // go one before to catch overlaps

      let safety = 0;
      while (safety < 500) {
        safety++;
        const occStart = new Date(startTs + n * freqMs);
        const occEnd = new Date(occStart.getTime() + durMs - 1);

        if (occStart > monthEnd) break;

        if (occEnd >= monthStart) {
          results.push({
            defId: def.id,
            titleKey: def.titleKey,
            shortKey: def.shortKey,
            descKey: def.descKey,
            color: def.color,
            start: new Date(occStart),
            end: new Date(occEnd),
          });
        }
        n++;
      }
    }
  }

  return results;
}

function getEventsForDay(year, month, day) {
  const dayStart = new Date(year, month, day);
  const dayEnd = new Date(year, month, day, 23, 59, 59);
  const all = getEventsForMonth(year, month);
  return all.filter(e => e.start <= dayEnd && e.end >= dayStart);
}

function formatDate(d) {
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  return `${dd}.${mm}.${yyyy}`;
}

// ===================== RENDER =====================
let viewYear, viewMonth;
let selectedDate = null;

function initCalendar() {
  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();
  render();
  updateUTC();
  setInterval(updateUTC, 10000);
}

function updateUTC() {
  const now = new Date();
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const d = days[now.getUTCDay()];
  const dd = String(now.getUTCDate()).padStart(2, '0');
  const mm = String(now.getUTCMonth() + 1).padStart(2, '0');
  const hh = String(now.getUTCHours()).padStart(2, '0');
  const mn = String(now.getUTCMinutes()).padStart(2, '0');
  document.getElementById('utcDisplay').textContent = `${d}, ${mm}/${dd}/${now.getUTCFullYear()}, ${hh}:${mn} UTC`;
}

function render() {
  // Update labels
  document.getElementById('yearLabel').textContent = viewYear;
  document.getElementById('monthLabel').textContent = t('month' + viewMonth);

  // Get events for this month
  const events = getEventsForMonth(viewYear, viewMonth);

  // Build event lookup: "YYYY-MM-DD" -> events
  const eventMap = {};
  for (const ev of events) {
    let d = new Date(ev.start);
    while (d <= ev.end) {
      const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      if (!eventMap[key]) eventMap[key] = [];
      eventMap[key].push(ev);
      d = new Date(d.getTime() + 24 * 60 * 60 * 1000);
    }
  }

  // Day-of-week headers
  const dowIds = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
  const dowRow = document.getElementById('dowRow');
  dowRow.innerHTML = dowIds.map(id => `<div class="cal-dow">${t(id)}</div>`).join('');

  // Calendar cells
  const calBody = document.getElementById('calBody');
  calBody.innerHTML = '';

  const firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
  // Adjust to Mon=0
  let startOffset = (firstDay === 0) ? 6 : firstDay - 1;

  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();

  const today = new Date();

  for (let row = 0; row < 6; row++) {
    for (let col = 0; col < 7; col++) {
      const cellIdx = row * 7 + col;
      const dayOffset = cellIdx - startOffset;
      let day, isOther = false, m = viewMonth, y = viewYear;

      if (dayOffset < 0) {
        // Previous month
        day = daysInPrev + dayOffset + 1;
        isOther = true;
        m = viewMonth - 1;
        y = viewYear;
        if (m < 0) { m = 11; y--; }
      } else if (dayOffset >= daysInMonth) {
        // Next month
        day = dayOffset - daysInMonth + 1;
        isOther = true;
        m = viewMonth + 1;
        y = viewYear;
        if (m > 11) { m = 0; y++; }
      } else {
        day = dayOffset + 1;
      }

      const isToday = !isOther && day === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
      const key = `${y}-${m}-${day}`;
      const dayEvents = eventMap[key] || [];

      // Build cell
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      if (isOther) cell.classList.add('other-month');
      if (isToday) cell.classList.add('today');

      cell.innerHTML = `<div class="day-num">${day}</div>`;

      // Event labels inside cell
      if (dayEvents.length > 0) {
        const labelsDiv = document.createElement('div');
        labelsDiv.className = 'event-labels';
        const seen = new Set();
        for (const ev of dayEvents) {
          if (!seen.has(ev.defId)) {
            seen.add(ev.defId);
            const label = document.createElement('div');
            label.className = 'event-label';
            label.style.background = ev.color;
            label.textContent = t(ev.shortKey);
            labelsDiv.appendChild(label);
          }
        }
        cell.appendChild(labelsDiv);
      }

      // Click handler
      if (!isOther) {
        cell.addEventListener('click', () => {
          showDetail(viewYear, viewMonth, day);
        });
      }

      calBody.appendChild(cell);
    }
  }

  // Restore selected date if still visible
  if (selectedDate) {
    const sy = selectedDate.getFullYear();
    const sm = selectedDate.getMonth();
    const sd = selectedDate.getDate();
    if (sy === viewYear && sm === viewMonth && sd >= 1 && sd <= daysInMonth) {
      showDetail(sy, sm, sd);
    } else {
      hideDetail();
    }
  } else {
    hideDetail();
  }
}

function showDetail(year, month, day) {
  selectedDate = new Date(year, month, day);
  const panel = document.getElementById('detailPanel');
  panel.classList.add('visible');

  const dateStr = `${String(day).padStart(2, '0')}.${String(month + 1).padStart(2, '0')}.${year}`;
  document.getElementById('detailDate').textContent = dateStr;

  const body = document.getElementById('detailBody');
  const evts = getEventsForDay(year, month, day);

  if (evts.length === 0) {
    body.innerHTML = `<div class="detail-empty">${t('no_events')}</div>`;
    return;
  }

  // Sort by start date
  evts.sort((a, b) => a.start - b.start);

  let html = '';
  for (const ev of evts) {
    const range = `${formatDate(ev.start)} — ${formatDate(ev.end)}`;
    html += `
      <div class="detail-item">
        <div class="detail-color" style="background:${ev.color}"></div>
        <div class="detail-name">${t(ev.titleKey)}</div>
        <div class="detail-range">${range}</div>
      </div>`;
  }
  body.innerHTML = html;
}

function hideDetail() {
  selectedDate = null;
  document.getElementById('detailPanel').classList.remove('visible');
}

// ===================== NAVIGATION =====================
document.getElementById('monthPrev').addEventListener('click', () => {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  render();
});
document.getElementById('monthNext').addEventListener('click', () => {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  render();
});
document.getElementById('yearPrev').addEventListener('click', () => {
  viewYear--;
  render();
});
document.getElementById('yearNext').addEventListener('click', () => {
  viewYear++;
  render();
});
document.getElementById('detailClose').addEventListener('click', hideDetail);

// ===================== EXPLANATIONS =====================
function renderExplanations() {
  const container = document.getElementById('explContent');
  let html = '<div class="expl-items">';
  for (const def of EVENT_DEFS) {
    html += `
      <div class="expl-item" style="border-color:${def.color}">
        <span class="expl-dot" style="background:${def.color}"></span>
        <span class="expl-name">${t(def.titleKey)}</span>
      </div>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

  explCollapsed = !explCollapsed;
  const content = document.getElementById('explContent');
  const title = document.getElementById('explTitle');
  content.classList.toggle('collapsed', explCollapsed);
  title.classList.toggle('collapsed', explCollapsed);
});
