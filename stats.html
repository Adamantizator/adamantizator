<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="page_title">Статистика участников — Excel Analyzer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --neon-yellow: #ffe600;
  --neon-gold: #ffdd00;
  --neon-amber: #ffb300;
  --neon-cyan: #00f0ff;
  --neon-red: #ff1030;
  --dark-bg: #0a0a0f;
  --panel-bg: #12121a;
  --card-bg: #1a1a2e;
  --input-bg: #0d0d1a;
  --border-glow: rgba(255, 230, 0, 0.3);
  --text-primary: #fff8dc;
  --text-dim: #e0d8b0;
  --text-muted: #c0b080;
  --font-display: 'Orbitron', monospace;
  --font-body: 'Rajdhani', sans-serif;
  --font-mono: 'Fira Code', monospace;
}

body {
  background: var(--dark-bg);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(rgba(255, 230, 0, 0.05) 1px, transparent 1px),
              linear-gradient(90deg, rgba(255, 230, 0, 0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
  pointer-events: none;
  z-index: 1;
}

.app { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; padding: 20px; }

.header {
  text-align: center;
  padding: 30px 0 20px;
}
.header h1 {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--neon-yellow), var(--neon-amber));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 30px rgba(255, 230, 0, 0.4));
}
.header .subtitle {
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 6px;
  color: var(--text-dim);
  margin-top: 6px;
  text-transform: uppercase;
}
.glitch-line {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-yellow), var(--neon-gold), transparent);
  margin: 12px 0 0;
  box-shadow: 0 0 20px rgba(255, 230, 0, 0.4);
}

.panel {
  background: var(--panel-bg);
  border: 1px solid var(--border-glow);
  border-radius: 4px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 0 20px rgba(255, 230, 0, 0.06), inset 0 0 30px rgba(255, 230, 0, 0.03);
}
.panel-title {
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--neon-yellow);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-title::before { content: '>'; color: var(--neon-gold); font-weight: 700; }

.row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
.col { display: flex; flex-direction: column; gap: 6px; }

label {
  font-family: var(--font-display);
  font-size: 0.6rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  display: block;
  margin-bottom: 4px;
}

input, select {
  font-family: var(--font-body);
  font-size: 0.95rem;
  padding: 7px 10px;
  background: var(--input-bg);
  border: 1px solid rgba(255, 230, 0, 0.25);
  color: var(--text-primary);
  border-radius: 3px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus {
  border-color: var(--neon-yellow);
  box-shadow: 0 0 15px rgba(255, 230, 0, 0.15);
}
select { cursor: pointer; }
select option { background: var(--card-bg); }

.btn {
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 20px;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--neon-yellow);
  color: #000;
}
.btn-primary:hover { box-shadow: 0 0 25px rgba(255, 230, 0, 0.4); }
.btn-outline {
  background: transparent;
  border: 1px solid var(--border-glow);
  color: var(--text-dim);
}
.btn-outline:hover { border-color: var(--neon-yellow); color: var(--neon-yellow); }
.btn-small { padding: 6px 14px; font-size: 0.6rem; }

/* TABLE */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: var(--input-bg);
  border: 1px solid var(--border-glow);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  margin-bottom: 0;
}
.status-bar .sum { color: var(--neon-yellow); }
.status-bar .count { color: var(--text-dim); }

.table-wrap {
  overflow-x: auto;
  background: var(--input-bg);
}
.table-wrap table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 0.8rem;
}
.table-wrap th {
  background: var(--card-bg);
  color: var(--text-muted);
  font-family: var(--font-display);
  font-size: 0.55rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 10px 12px;
  text-align: right;
  border-bottom: 1px solid rgba(255, 230, 0, 0.15);
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 1;
}
.table-wrap th:first-child { text-align: center; }
.table-wrap th:nth-child(2) { text-align: left; }
.table-wrap td {
  padding: 8px 12px;
  text-align: right;
  border-bottom: 1px solid rgba(255, 230, 0, 0.04);
  white-space: nowrap;
}
.table-wrap td:first-child { text-align: center; color: var(--text-muted); }
.table-wrap td:nth-child(2) { text-align: left; color: var(--neon-yellow); font-weight: 600; }
.table-wrap tr:hover td { background: rgba(255, 230, 0, 0.03); }

.msg {
  padding: 10px 16px;
  margin-top: 8px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  display: none;
}
.msg.info { display: block; background: rgba(255, 230, 0, 0.08); border: 1px solid rgba(255, 230, 0, 0.2); color: var(--neon-yellow); }
.msg.error { display: block; background: rgba(255, 16, 48, 0.1); border: 1px solid rgba(255, 16, 48, 0.3); color: var(--neon-red); }
.hidden { display: none !important; }

@keyframes flicker {
  0%, 82% { opacity: 1; }
  86% { opacity: 1; }
  90% { opacity: 0.85; }
  94% { opacity: 1; }
  98% { opacity: 0.85; }
  100% { opacity: 1; }
}
.flicker { animation: flicker 4s infinite; }

@keyframes flicker-glow-text {
  0%, 82% { -webkit-text-stroke: 0 transparent; }
  86% { -webkit-text-stroke: 1.5px #ff1030; }
  90% { -webkit-text-stroke: 0 transparent; }
  94% { -webkit-text-stroke: 1.5px #ff1030; }
  98% { -webkit-text-stroke: 0 transparent; }
  100% { -webkit-text-stroke: 0 transparent; }
}
.flicker-glow-text { animation: flicker-glow-text 4s infinite; }

@keyframes flicker-glow {
  0%, 82% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05); }
  86% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05), 0 0 15px rgba(255, 16, 48, 0.5), 0 0 40px rgba(255, 16, 48, 0.2); }
  90% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05); }
  94% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05), 0 0 15px rgba(255, 16, 48, 0.5), 0 0 40px rgba(255, 16, 48, 0.2); }
  98% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05); }
  100% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05); }
}
.flicker-glow { animation: flicker-glow 4s infinite; }

/* LANG SWITCHER */
.lang-switch {
  position: fixed;
  top: 4px; right: 8px;
  display: flex;
  gap: 2px;
  z-index: 100;
}
.lang-btn {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 3px 8px;
  background: var(--input-bg);
  border: 1px solid rgba(255, 230, 0, 0.2);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.lang-btn:first-child { border-radius: 3px 0 0 3px; }
.lang-btn:last-child { border-radius: 0 3px 3px 0; }
.lang-btn.active {
  background: var(--neon-yellow);
  color: #000;
  border-color: var(--neon-yellow);
}
.lang-btn:hover:not(.active) { border-color: var(--neon-yellow); }

.cal-btn {
  font-family: var(--font-display); font-size: 0.6rem;
  padding: 3px 8px; background: var(--input-bg);
  border: 1px solid rgba(255, 230, 0, 0.2);
  color: var(--text-muted); cursor: pointer; text-decoration: none;
  text-transform: uppercase; letter-spacing: 1px;
  transition: all 0.2s;
}
.cal-btn:hover { border-color: var(--neon-yellow); color: var(--neon-yellow); }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--dark-bg); }
::-webkit-scrollbar-thumb { background: var(--neon-yellow); border-radius: 3px; }

@media (max-width: 768px) {
  .header { padding-top: 36px; }
  .header h1 { font-size: 1.2rem; letter-spacing: 2px; }
  .row { gap: 10px; flex-direction: column; align-items: stretch; }
  .app { padding: 10px; }
  .panel { padding: 12px; }
  table { font-size: 0.7rem; }
  thead th { font-size: 0.5rem; padding: 6px 4px; }
  tbody td { padding: 6px 4px; }
}

.cyber-banner-small {
  width: 100%;
  max-width: 160px;
  margin: 0 auto 20px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid rgba(255, 230, 0, 0.3);
  box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05);
  position: relative;
  background: var(--panel-bg);
  padding: 10px;
}
.cyber-banner-small::before {
  content: '';
  position: absolute;
  top: -5px; left: -5px; right: -5px; bottom: -5px;
  border-radius: 50%;
  background: linear-gradient(45deg, rgba(255, 230, 0, 0.1), transparent, rgba(255, 230, 0, 0.1));
  animation: rotate 8s linear infinite;
  pointer-events: none;
}
.cyber-banner-small img {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 50%;
  position: relative;
  z-index: 1;
}
.cyber-banner-small::after {
  content: '';
  position: absolute;
  top: 10px; left: 10px; right: 10px; bottom: 10px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255, 230, 0, 0.1), transparent 45%, transparent 55%, rgba(255, 230, 0, 0.03));
  pointer-events: none;
  z-index: 2;
}
</style>
</head>
<body>
<div class="lang-switch">
  <a href="calendar.html" class="cal-btn" data-i18n="calendar_btn">📅 Calendar</a>
  <button class="lang-btn" data-lang="ru">RU</button>
  <button class="lang-btn" data-lang="en">EN</button>
</div>
<div class="app" id="app">
  <header class="header flicker">
    <div style="text-align:left;margin-bottom:4px;">
      <a href="index.html" style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);text-decoration:none;letter-spacing:1px;" data-i18n="back">← Главная</a>
    </div>
    <h1 class="flicker-glow-text" data-i18n="title">СТАТИСТИКА УЧАСТНИКОВ</h1>
    <div class="subtitle" data-i18n="subtitle">Excel Table Analyzer</div>
    <div class="glitch-line"></div>
  </header>

  <!-- CYBER BANNER (Small Logo) -->
  <div class="cyber-banner-small flicker-glow">
    <img src="icons/logo.png" alt="ADAMANTIZATOR Logo" loading="lazy" onerror="this.style.display='none'">
  </div>

  <!-- FILE -->
  <div class="panel">
    <div class="panel-title" data-i18n="file">Файл</div>
    <div class="row">
      <button class="btn btn-primary" id="loadBtn" data-i18n="open_excel">[ ОТКРЫТЬ EXCEL ]</button>
      <span id="fileLabel" style="color:var(--text-dim);font-size:0.9rem;" data-i18n="no_file">Файл не выбран</span>
      <span id="fileInfo" style="color:var(--text-dim);font-size:0.85rem;font-family:var(--font-mono);"></span>
    </div>
    <div id="loadMsg" class="msg"></div>
  </div>

  <!-- PRELOADED FILES -->
  <div class="panel" id="preloadPanel">
    <div class="panel-title" data-i18n="preloaded">Предзагруженные данные</div>
    <div id="preloadList" class="row" style="gap:8px;min-height:30px;"></div>
    <div id="preloadMsg" class="hidden"></div>
  </div>

  <!-- FILTERS -->
  <div class="panel">
    <div class="panel-title" data-i18n="filters">Фильтры и опции</div>
    <div class="row" style="margin-bottom:12px;">
      <div class="col" style="min-width:180px;flex:1;">
        <label data-i18n="column_label">Столбец для анализа</label>
        <select id="columnSelect" style="width:100%;">
          <option value="">— загрузите файл —</option>
        </select>
      </div>
    </div>
    <div class="row" style="margin-bottom:12px;">
      <div class="col" style="min-width:80px;">
        <label data-i18n="from_place">С места</label>
        <input type="number" id="fromPlace" value="" min="1" style="width:90px;">
      </div>
      <div class="col" style="min-width:80px;">
        <label data-i18n="to_place">По место</label>
        <input type="number" id="toPlace" value="" min="1" style="width:90px;">
      </div>
      <div class="col" style="min-width:100px;">
        <label data-i18n="min_val">Нижняя граница (≥)</label>
        <input type="number" id="minVal" value="" style="width:120px;">
      </div>
      <div class="col" style="min-width:100px;">
        <label data-i18n="max_val">Верхняя граница (≤)</label>
        <input type="number" id="maxVal" value="" style="width:120px;">
      </div>
      <div class="col" style="min-width:140px;margin-left:auto;">
        <label data-i18n="search_nick">Поиск по нику</label>
        <input type="text" id="searchNick" placeholder="Введите ник..." style="width:100%;">
      </div>
    </div>
    <div class="row">
      <button class="btn btn-primary" id="calcBtn" data-i18n="apply_btn">[ ПРИМЕНИТЬ ]</button>
      <button class="btn btn-outline btn-small" id="exportBtn" data-i18n="export_btn">[ СКАЧАТЬ TXT ]</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="panel" style="padding:0;overflow:hidden;">
    <div class="status-bar">
      <span class="sum" id="sumDisplay" data-i18n-dynamic>Сумма: 0</span>
      <span class="count" id="countDisplay" data-i18n-dynamic>Всего записей: 0</span>
    </div>
    <div class="table-wrap" id="tableWrap">
      <table>
        <thead>
          <tr>
            <th id="thIdx" style="width:40px;text-align:center;cursor:pointer;">#</th>
            <th id="thName" style="text-align:left;cursor:pointer;" data-i18n="th_player">Игрок</th>
            <th id="thColumn" style="text-align:right;width:100px;cursor:pointer;">—</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ===== I18N =====
const LANG = {
  ru: {
    back: '← Главная', title: 'СТАТИСТИКА УЧАСТНИКОВ', subtitle: 'Статистика Участников / Participant Statistics', page_title: 'Статистика участников — Excel Analyzer',
    file: 'Файл', open_excel: '[ ОТКРЫТЬ EXCEL ]', no_file: 'Файл не выбран',
    preloaded: 'Предзагруженные данные',
    filters: 'Фильтры и опции',
    column_label: 'Столбец для анализа',
    from_place: 'С места', to_place: 'По место',
    min_val: 'Нижняя граница (≥)', max_val: 'Верхняя граница (≤)',
    search_nick: 'Поиск по нику', search_placeholder: 'Введите ник...',
    apply_btn: '[ ПРИМЕНИТЬ ]', export_btn: '[ СКАЧАТЬ TXT ]',
    th_player: 'Игрок', th_value: 'Значение',
    sum_label: 'Сумма:', count_label: 'Всего записей:', unknown: 'Неизвестный',
    loaded: 'загружен', rows: 'Строк:', cols: 'Столбцов:',
    err_empty: 'Файл пуст или не содержит данных.', err_no_data: 'Нет строк с данными.',
    err_no_file: 'Выберите столбец.', ok_loaded: 'загружен.',
    hint_file: ' (откройте сайт через http://localhost:8080, а не через file://)',
    err_http: 'Ошибка загрузки',
    err_parse: 'Ошибка чтения',
    empty_no_data: 'Нет данных для экспорта.',
    calendar_btn: '📅 Календарь',
  },
  en: {
    back: '← Home', title: 'PARTICIPANT STATISTICS', subtitle: 'Participant Statistics / Статистика Участников', page_title: 'Participant Statistics — Excel Analyzer',
    file: 'File', open_excel: '[ OPEN EXCEL ]', no_file: 'No file selected',
    preloaded: 'Preloaded Data',
    filters: 'Filters & Options',
    column_label: 'Analysis column',
    from_place: 'From place', to_place: 'To place',
    min_val: 'Min value (≥)', max_val: 'Max value (≤)',
    search_nick: 'Search nickname', search_placeholder: 'Enter nickname...',
    apply_btn: '[ APPLY ]', export_btn: '[ DOWNLOAD TXT ]',
    th_player: 'Player', th_value: 'Value',
    sum_label: 'Sum:', count_label: 'Total records:', unknown: 'Unknown',
    loaded: 'loaded', rows: 'Rows:', cols: 'Columns:',
    err_empty: 'The file is empty or contains no data.', err_no_data: 'No data rows.',
    err_no_file: 'Select a column.', ok_loaded: 'loaded.',
    hint_file: ' (open the site via http://localhost:8080, not file://)',
    err_http: 'Load error',
    err_parse: 'Read error',
    empty_no_data: 'No data to export.',
    calendar_btn: '📅 Calendar',
  },
};

const detected = navigator.language.startsWith('ru') ? 'ru' : 'en';
let lang = localStorage.getItem('lang') || detected;

function t(key) { return LANG[lang][key] || key; }

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (LANG[lang][key]) el.textContent = LANG[lang][key];
  });
  document.querySelectorAll('[data-i18n-dynamic]').forEach(el => {
    const key = el.dataset.i18nDynamic;
    if (key === 'sum_label') el.textContent = `${t('sum_label')} 0`;
    else if (key === 'count_label') el.textContent = `${t('count_label')} 0`;
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  document.documentElement.lang = lang;
  const sn = document.getElementById('searchNick');
  if (sn) sn.placeholder = t('search_placeholder');
  if (rawData && rawData.length > 0 && typeof applyFilters === 'function') applyFilters();
}

// ===== STATE =====
let df = null;
let headers = [];
let rawData = [];
let column = '';
let lastFiltered = [];
let currentSort = { col: null, dir: 'none' };

// ===== DOM REFS =====
const $ = id => document.getElementById(id);
const loadBtn = $('loadBtn');
const fileLabel = $('fileLabel');
const fileInfo = $('fileInfo');
const loadMsg = $('loadMsg');
const columnSelect = $('columnSelect');
const fromPlace = $('fromPlace');
const toPlace = $('toPlace');
const minVal = $('minVal');
const maxVal = $('maxVal');
const searchNick = $('searchNick');
const calcBtn = $('calcBtn');
const exportBtn = $('exportBtn');
const sumDisplay = $('sumDisplay');
const countDisplay = $('countDisplay');
const thColumn = $('thColumn');
const tableBody = $('tableBody');

applyLang();

// ===== HELPERS =====
function fmtNum(n) { return Math.floor(n).toLocaleString('ru-RU'); }

function getPlayerName(row) {
  const nameCols = ['Имя пользователя', 'Ник', 'Игрок', 'Username', 'Nick', 'Player', 'Name', 'name', 'Имя'];
  for (const c of nameCols) {
    const idx = headers.indexOf(c);
    if (idx !== -1 && row[idx] && String(row[idx]).trim()) return String(row[idx]).trim();
  }
  return t('unknown');
}

function showMsg(el, type, text) {
  el.className = 'msg ' + type;
  el.textContent = text;
}

// ===== PRELOADED FILES =====
const preloadList = $('preloadList');
const preloadMsg = $('preloadMsg');

const PRELOADED_FILES = [
  '06-07.06-2026_3901.xlsx',
  '10-16.06-2026_3901.xlsx',
];

function preloadLabel(filename) {
  return filename.replace(/\.[^.]+$/, '').replace(/_/g, ' ');
}

function showPreloadMsg(type, text) {
  preloadMsg.className = `msg ${type}`;
  preloadMsg.textContent = text;
  setTimeout(() => { preloadMsg.className = 'hidden'; }, 4000);
}

function loadExcelFromBuffer(arrayBuffer, fileName) {
  try {
    const workbook = XLSX.read(arrayBuffer, { type: 'array' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
    if (json.length < 2) return false;
    headers = json[0].map(h => String(h).trim());
    rawData = json.slice(1).filter(row => row.some(cell => cell !== undefined && cell !== null && cell !== ''));
    if (rawData.length === 0) return false;
    // Build column select
    columnSelect.innerHTML = headers.map((h, i) =>
      `<option value="${i}">${h}</option>`
    ).join('');
    // Auto-select first numeric column
    let autoIdx = -1;
    for (let i = 0; i < headers.length; i++) {
      const vals = rawData.map(r => Number(r[i])).filter(v => !isNaN(v));
      if (vals.length > rawData.length * 0.5) { autoIdx = i; break; }
    }
    if (autoIdx === -1) autoIdx = 0;
    columnSelect.value = autoIdx;
    column = headers[autoIdx];
    thColumn.textContent = column;
    fileLabel.textContent = fileName;
    fileInfo.textContent = `${t('rows')} ${rawData.length}, ${t('cols')} ${headers.length}`;
    showMsg(loadMsg, 'info', `${t('ok_loaded')}`);
    applyFilters();
    return true;
  } catch (err) {
    return false;
  }
}

async function loadPreloadedFile(filename) {
  try {
    const resp = await fetch(`data/${encodeURIComponent(filename)}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const arrayBuffer = await resp.arrayBuffer();
    const ok = loadExcelFromBuffer(arrayBuffer, filename);
    if (!ok) { showPreloadMsg('error', `${t('err_empty')}`); return; }
    showPreloadMsg('info', `"${preloadLabel(filename)}" ${t('loaded')}`);
  } catch (err) {
    const hint = window.location.protocol === 'file:'
      ? t('hint_file')
      : '';
    showPreloadMsg('error', `${t('err_http')} "${preloadLabel(filename)}": ${err.message}${hint}`);
  }
}

function renderPreloadedFiles() {
  const panel = document.getElementById('preloadPanel');
  if (!PRELOADED_FILES.length) { panel.style.display = 'none'; return; }
  panel.style.display = '';
  preloadList.innerHTML = '';
  PRELOADED_FILES.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-outline btn-small';
    btn.textContent = preloadLabel(f);
    btn.addEventListener('click', () => loadPreloadedFile(f));
    preloadList.appendChild(btn);
  });
}
renderPreloadedFiles();

// ===== LOAD FILE =====
loadBtn.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.xlsx,.xls';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      if (!loadExcelFromBuffer(ev.target.result, file.name)) {
        showMsg(loadMsg, 'error', t('err_empty'));
      }
    };
    reader.readAsArrayBuffer(file);
  };
  input.click();
});

// ===== FILTERS =====
function applyFilters() {
  if (!rawData.length) return;

  const colIdx = parseInt(columnSelect.value);
  if (isNaN(colIdx) || colIdx < 0 || colIdx >= headers.length) {
    showMsg(loadMsg, 'error', t('err_no_file'));
    return;
  }

  column = headers[colIdx];
  thColumn.textContent = column;
  const from = parseInt(fromPlace.value) || 1;
  const to = parseInt(toPlace.value) || rawData.length;
  const min = parseFloat(minVal.value);
  const max = parseFloat(maxVal.value);
  const search = searchNick.value.trim().toLowerCase();

  // Build data with parsed values
  let data = rawData.map((row, idx) => {
    const val = Number(row[colIdx]);
    return {
      row,
      idx,
      val: isNaN(val) ? -Infinity : val,
      name: getPlayerName(row),
    };
  });

  // Sort by currentSort
  if (currentSort.dir !== 'none' && currentSort.col) {
    data.sort((a, b) => {
      let va, vb;
      if (currentSort.col === 'idx') { va = a.idx; vb = b.idx; }
      else if (currentSort.col === 'name') { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
      else { va = a.val; vb = b.val; }
      if (typeof va === 'number') return currentSort.dir === 'asc' ? va - vb : vb - va;
      return currentSort.dir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });
  } else {
    data.sort((a, b) => a.idx - b.idx);
  }

  // Place range
  const fromIdx = Math.max(0, from - 1);
  const toIdx = Math.min(data.length, to);
  data = data.slice(fromIdx, toIdx);

  // Min/max filter
  if (!isNaN(min)) data = data.filter(d => d.val >= min);
  if (!isNaN(max)) data = data.filter(d => d.val <= max);

  // Search by nickname
  if (search) data = data.filter(d => d.name.toLowerCase().includes(search));

  lastFiltered = data;

  // Render header arrows
  const arrow = (col) => currentSort.col === col ? (currentSort.dir === 'asc' ? ' ▲' : ' ▼') : '';
  document.getElementById('thIdx').textContent = '#' + arrow('idx');
  document.getElementById('thName').textContent = t('th_player') + arrow('name');
  thColumn.textContent = column + arrow('value');

  // Render table
  let sum = 0;
  tableBody.innerHTML = data.map((d, i) => {
    const place = fromIdx + 1 + i;
    const val = d.val === -Infinity ? 0 : d.val;
    sum += val;
    return `<tr>
      <td>${place}</td>
      <td>${d.name || '—'}</td>
      <td>${fmtNum(val)}</td>
    </tr>`;
  }).join('');

  sumDisplay.textContent = `${t('sum_label')} ${fmtNum(sum)}`;
  countDisplay.textContent = `${t('count_label')} ${data.length}`;

  showMsg(loadMsg, 'info', `${t('count_label')} ${data.length}, ${t('sum_label')} ${fmtNum(sum)}`);
}

// ===== HEADER SORT CLICK =====
document.querySelector('#tableWrap thead').addEventListener('click', e => {
  const th = e.target.closest('th');
  if (!th) return;
  const col = th.id === 'thIdx' ? 'idx' : th.id === 'thName' ? 'name' : 'value';
  if (currentSort.col === col) {
    currentSort.dir = currentSort.dir === 'none' ? 'asc' : currentSort.dir === 'asc' ? 'desc' : 'none';
  } else {
    currentSort.col = col;
    currentSort.dir = 'asc';
  }
  applyFilters();
});

// ===== EVENTS =====
[columnSelect, fromPlace, toPlace, minVal, maxVal, searchNick].forEach(el => {
  el.addEventListener('input', applyFilters);
});
calcBtn.addEventListener('click', applyFilters);

// ===== EXPORT =====
exportBtn.addEventListener('click', () => {
  if (!lastFiltered.length) {
    showMsg(loadMsg, 'error', t('empty_no_data'));
    return;
  }

  const langSuffix = lang === 'ru' ? 'ru-RU' : 'en-US';
  const lines = [];
  lines.push(`=== EXPORT | ${new Date().toLocaleString(langSuffix)} ===`);
  lines.push(`${t('th_value')}: ${column}`);
  lines.push(`${t('count_label')} ${lastFiltered.length}`);
  lines.push(`${t('sum_label')} ${fmtNum(lastFiltered.reduce((s, d) => s + (d.val === -Infinity ? 0 : d.val), 0))}`);
  lines.push('='.repeat(120));
  lines.push('');

  let sum = 0;
  lastFiltered.forEach((d, i) => {
    const val = d.val === -Infinity ? 0 : d.val;
    sum += val;
    lines.push(`# ${i + 1} | ${t('th_player')}: ${d.name} | ${column}: ${fmtNum(val)}`);
  });

  lines.push('');
  lines.push('='.repeat(120));
  lines.push(`${t('sum_label')} ${fmtNum(sum)}`);

  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Stats_${new Date().toISOString().slice(0, 10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
