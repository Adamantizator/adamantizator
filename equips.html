<script>
const S = (s,n) => ({s,n,i:''});
const EQUIP = {
  infantry: {
    label: {ru:'Пехота',en:'Infantry'},
    sets:[

function renderSetCountersHtml(names){
  const counts={};
  names.forEach(n=>{const s=ITEM_SET_MAP[n];if(s)counts[s]=(counts[s]||0)+1});
  const entries=Object.entries(counts).filter(([,c])=>c>0);
  if(!entries.length)return'';
  let h='';
  entries.forEach(([set,cnt],idx)=>{
    const total=SET_TOTAL[set]||6;
    if(idx>0)h+=`<div style="margin-top:7px"></div>`;
    h+=`<div style="color:#fff;font-size:0.65rem;margin-top:5px">${sn(set)}: ${cnt}/${total}</div>`;
    const bonuses=SET_BONUSES[set];
    if(bonuses)[6,4,2].filter(t=>cnt>=t).forEach(t=>{
      const raw=bonuses[t]; if(!raw)return;
      raw.split(', ').forEach(part=>{
        const m=part.match(/^(.+?)\s+([+-]\d+(?:\.\d+)?)%?$/);
        const k=m?m[1]:part;
        const v=m?m[2]:'';
        const sv=lang==='ru'?(STAT_KEYS_RU[k.trim()]||k):k;
        const cls=m?statColorClass(m[1]):'stat-march';
        h+=`<div style="font-size:0.6rem;line-height:1.4"><span class="${cls}">${sv}${v?' '+v+'%':''}</span></div>`;
      });
    });
  });
  return h;
}
function getSetStats(troop, setId){
  const td=EQUIP[troop];
  const set=td&&td.sets.find(s=>s.id===setId);
  if(!set)return[];
  const agg={},procs=[],names=[];
  set.slots.forEach(sl=>{
    if(!sl.n)return;
    names.push(sl.n);
    const raw=STATS_MAP[sl.n];
    if(!raw)return;
    const mult=setCrits[troop+'-'+setId+'-'+sl.s]?1.3:1;
    raw.split(', ').forEach(stat=>{
      const m=stat.match(/^(.+?)\s+([+-]\d+(?:\.\d+)?)%$/);
      if(m){const k=m[1];const v=parseFloat(m[2]);agg[k]=(agg[k]||0)+Math.round(v*mult*2)/2}
      else if(stat.includes('(proc)'))procs.push(stat);
      else{const m2=stat.match(/^(.+?)\s+([+-]\d+(?:\.\d+)?)$/);if(m2){const k=m2[1];const v=parseFloat(m2[2]);agg[k]=(agg[k]||0)+Math.round(v*mult*2)/2}}
    });
  });
  return {agg,procs,hint:set.hint,names};
}
function renderStatsHtml(data){
  const{agg,procs,hint,names}=data;
  const sorted=Object.entries(agg).sort((a,b)=>{
    const ka=statSortKey(a[0]),kb=statSortKey(b[0]);
    return ka!==kb?ka-kb:Math.abs(b[1])-Math.abs(a[1]);
  });
  let h=sorted.map(([k,v])=>`<div class="stat-row"><span class="${statColorClass(k)}">${ts(k)}</span><span class="val ${statColorClass(k)}">${v>0?'+':''}${v}%</span></div>`).join('');
  procs.forEach(p=>{h+=`<div class="stat-row"><span>${p}</span><span class="val">⚡</span></div>`});
  const setHtml=names?renderSetCountersHtml(names):'';
  if(setHtml){
    h+=setHtml;
    if(hint)h+=`<div style="border-top:1px solid rgba(255,230,0,0.2);margin:6px 0 4px"></div><div style="font-size:0.55rem;color:var(--text-dim);line-height:1.5;max-width:260px;margin-top:4px">${tt(hint)}</div>`;
  }else if(hint){
    h+=`<div style="border-top:1px solid rgba(255,230,0,0.2);margin:6px 0 4px"></div><div style="font-size:0.55rem;color:var(--text-dim);line-height:1.5;max-width:260px;margin-top:4px">${tt(hint)}</div>`;
  }
  return h;
}

function getItemTroop(name){
  const raw=STATS_MAP[name]; if(!raw)return'';
  const matches=[...raw.matchAll(/([A-Za-z\s/]+?)\s+([+-]\d+(?:\.\d+)?)%?/g)];
  let maxV=-Infinity,best='';
  matches.forEach(([,k,v])=>{
    const val=parseFloat(v);
    if(val>maxV){maxV=val;best=k.trim()}
  });
  const t=best.toLowerCase();
  if(t.includes('infantry'))return'infantry';
  if(t.includes('cavalry'))return'cavalry';
  if(t.includes('archer'))return'archer';
  if(t.includes('siege'))return'siege';
  return'';
}

function switchMode(mode){
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  const isSets=mode==='sets';
  const isB=mode==='builder';
  const isC=mode==='cost';
  const showB=isB||isC;
  document.getElementById('troopContent').style.display=isSets?'':'none';
  document.getElementById('troopTabs').style.display=isSets?'':'none';
  document.getElementById('builderWrap').classList.toggle('active',showB);
  builder.active=showB;
  builder.costMode=isC;
  if(showB)renderBuilder();
}

function statColorClass(k){
  const kl=k.toLowerCase();
  if(kl.includes('infantry'))return'stat-inf';
  if(kl.includes('cavalry'))return'stat-cav';
  if(kl.includes('archer'))return'stat-arch';
  if(kl.includes('siege'))return'stat-siege';
  if(kl.includes('march'))return'stat-march';
  if(kl.includes('barbarian')||kl.includes('xp')||kl.includes('exp gain'))return'stat-barb';
  return'stat-march';
}
function statSortKey(k){
  const kl=k.toLowerCase();
  if(kl.includes('infantry'))return 0;
  if(kl.includes('cavalry'))return 1;
  if(kl.includes('archer'))return 2;
  if(kl.includes('siege'))return 3;
  if(kl.includes('barbarian')||kl.includes('xp')||kl.includes('exp gain'))return 5;
  return 4;
}
function calcBuilderStats(){
  const agg={},procs=[],names=[];
  SLOT_ORDER.forEach(sk=>{
    const n=builder.slots[sk]; if(!n)return;
    names.push(n);
    const raw=STATS_MAP[n]; if(!raw)return;
    const mult=builder.crits[sk]?1.3:1;
    raw.split(', ').forEach(s=>{
      const m=s.match(/^(.+?)\s+([+-]\d+(?:\.\d+)?)%$/);
      if(m){const k=m[1];const v=parseFloat(m[2]);agg[k]=(agg[k]||0)+Math.round(v*mult*2)/2}
      else if(s.includes('(proc)'))procs.push(s);
      else{const m2=s.match(/^(.+?)\s+([+-]\d+(?:\.\d+)?)$/);if(m2){const k=m2[1];const v=parseFloat(m2[2]);agg[k]=(agg[k]||0)+Math.round(v*mult*2)/2}}
    });
  });
  const sorted=Object.entries(agg).sort((a,b)=>{
    const ka=statSortKey(a[0]),kb=statSortKey(b[0]);
    return ka!==kb?ka-kb:Math.abs(b[1])-Math.abs(a[1]);
  });
  let h=sorted.map(([k,v])=>`<div class="stat-row"><span class="${statColorClass(k)}">${ts(k)}</span><span class="val ${statColorClass(k)}">${v>0?'+':''}${v}%</span></div>`).join('');
  procs.forEach(p=>{h+=`<div class="stat-row proc"><span>${p}</span><span class="val">⚡</span></div>`});
  h+=renderSetCountersHtml(names);
  return h;
}
function itemDetailHtml(name, crit){
  const raw=STATS_MAP[name]; if(!raw)return'';
  const stats=raw.split(', ').map(s=>{
    const m=s.match(/^(.+?)\s+([+-]\d+(?:\.\d+)?)%?$/);
    if(m){const k=m[1],v=m[2];return{name:ts(k),value:v,cls:statColorClass(k)}}
    return{name:s,value:'',cls:''};
  });
  const rarity=RARITY_MAP[name]||'';
  let h=`<div class="id-title">${lang==='ru'?'Характеристики предмета':'Item Stats'}</div>`;
  h+=`<div class="id-name">${tn(name)}</div>`;
  if(crit)h+=`<div class="crit-diamond" style="display:inline-block;margin:4px 0;padding:2px 6px;border:1px solid var(--neon-red);border-radius:3px;font-size:0.5rem;color:var(--neon-red)">◆ CRIT +30%</div>`;
  if(rarity)h+=`<div style="color:var(--text-muted);margin-bottom:4px;font-size:0.5rem">${rarity}</div>`;
  stats.forEach(st=>{
    if(st.value){
      const val=parseFloat(st.value);
      const cv=crit?Math.round(val*1.3*2)/2:val;
      const sign=cv>=0?'+':'';
      h+=`<div class="id-stat"><span class="${st.cls}">${st.name}</span><span class="val ${st.cls}">${sign}${cv.toFixed(1)}%</span></div>`;
    }
    else h+=`<div class="id-stat"><span>${st.name}</span></div>`;
  });
  return h;
}

function calcBuilderCost(){
  const matAgg={};
  SLOT_ORDER.forEach(sk=>{
    const n=builder.slots[sk];
    if(!n)return;
    const cost=ITEM_COST_MAP[n];
    if(!cost)return;
    Object.entries(cost.materials).forEach(([mat,tiers])=>{
      Object.entries(tiers).forEach(([quality,qty])=>{
        if(!matAgg[mat])matAgg[mat]={};
        matAgg[mat][quality]=(matAgg[mat][quality]||0)+qty;
      });
    });
  });
  return matAgg;
}
function matIconHtml(mat){
  const src=MATERIAL_ICONS[mat];
  if(src)return`<img src="${src}" class="mat-icon">`;
  return'';
}
function matRowHtml(mat,tiers,showNormal){
  const labels=lang==='ru'?MATERIAL_LABELS_RU:MATERIAL_LABELS;
  const lbl=labels[mat]||mat;
  const icon=matIconHtml(mat);
  const parts=Object.entries(tiers).sort((a,b)=>{
    const o={LEGENDARY:5,EPIC:4,ELITE:3,ADVANCED:2,COMMON:1};
    return (o[b[0]]||0)-(o[a[0]]||0);
  });
  let h=parts.map(([quality,qty])=>{
    const ql=quality==='COMMON'?(lang==='ru'?'Обычный':'Common'):quality.charAt(0).toUpperCase()+quality.slice(1).toLowerCase();
    return`<span class="qty">${qty}</span><span class="tier">${ql}</span>`;
  }).join('');
  if(showNormal){
    const normalTotal=parts.reduce((s,[q,t])=>s+t*(QUALITY_MULT[q]||1),0);
    h+=`<span style="margin-left:8px;color:var(--text-muted);font-size:0.5rem">= ${normalTotal.toLocaleString('ru-RU')} ${lang==='ru'?'Обычный':'Common'}</span>`;
  }
  return`<div class="mat-row">${icon}<span style="min-width:48px;color:var(--text-dim)">${lbl}</span>${h}</div>`;
}
function itemCostHtml(name){
  const cost=ITEM_COST_MAP[name];
  if(!cost)return`<div style="font-family:var(--font-mono);font-size:0.55rem;color:var(--text-muted);padding:4px">${builder.costMode?t('cost_no_data'):''}</div>`;
  let h=`<div class="id-title">${lang==='ru'?'Стоимость':'Cost'}</div>`;
  h+=`<div class="id-name">${tn(name)}</div>`;
  if(cost.quality)h+=`<div style="color:var(--text-muted);margin-bottom:6px;font-size:0.5rem">${cost.quality}</div>`;
  Object.entries(cost.materials).sort((a,b)=>{
    const ai=MATERIAL_ORDER.indexOf(a[0]),bi=MATERIAL_ORDER.indexOf(b[0]);
    return (ai===-1?99:ai)-(bi===-1?99:bi);
  }).forEach(([mat,tiers])=>{
    h+=matRowHtml(mat,tiers,false);
  });
  return h;
}
function renderCostTotalHtml(matAgg){
  const entries=Object.entries(matAgg);
  if(!entries.length)return`<div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-muted);padding:8px 4px">${t('cost_empty')}</div>`;
  let h='';
  let totalCommon=0;
  entries.sort((a,b)=>{
    const ai=MATERIAL_ORDER.indexOf(a[0]),bi=MATERIAL_ORDER.indexOf(b[0]);
    return (ai===-1?99:ai)-(bi===-1?99:bi);
  }).forEach(([mat,tiers])=>{
    h+=matRowHtml(mat,tiers,true);
    totalCommon+=Object.entries(tiers).reduce((s,[q,t])=>s+t*(QUALITY_MULT[q]||1),0);
  });
  const totalLeg=totalCommon/256;
  h+=`<div class="mat-row" style="border-top:1px solid rgba(255,230,0,0.2);margin-top:6px;padding-top:6px"><span style="font-weight:700;color:var(--neon-yellow)">${lang==='ru'?'Всего Legendary':'Total Legendary'}:</span><span class="qty" style="min-width:auto;margin-left:8px;font-size:0.65rem">${totalLeg.toLocaleString('ru-RU',{minimumFractionDigits:1,maximumFractionDigits:1})}</span></div>`;
  h+=`<div style="font-size:0.55rem;color:var(--text-muted);padding:2px 4px 0;text-align:right">= ${totalCommon.toLocaleString('ru-RU')} ${lang==='ru'?'Обычный':'Common'}</div>`;
  return h;
}

function clearSlots(){builder.slots={};builder.crits={};builder.selectedSlot=null;builder.viewingItem=null;builder.viewingSlot=null;renderBuilder()}

function renderBuilder(){
  const bar=document.getElementById('presetBar');
  bar.innerHTML=`<button class="preset-btn clear" id="clearSlots">${lang==='ru'?'Очистить':'Clear'}</button>`;
  document.getElementById('clearSlots').onclick=clearSlots;

  const grid=document.getElementById('slotGrid');
  function slotHtml(sk){
    const n=builder.slots[sk];
    const sel=builder.selectedSlot===sk?' selected':'';
    const lbl=lang==='ru'?(SLOT_KEYS_RU[sk]||sk):tt(SLOT_KEYS[sk]);
    const baseSrc=BASE_ICONS[sk]||'';
    const iconSrc=n?(ICON_MAP[n]||baseSrc):baseSrc;
    const rarity=n?RARITY_MAP[n]||'':'';
    let h=`<div class="b-slot-cell${sel}${builder.crits[sk]&&!builder.costMode?' crit':''}${rarity?' r-'+rarity:''}" data-sk="${sk}">`;
    if(n)h+=`<button class="sc-remove" data-sk="${sk}">×</button>`;
    if(n&&!builder.costMode)h+=`<span class="crit-diamond${builder.crits[sk]?' crit-on':' crit-off'}"></span>`;
    h+=`<div class="sc-icon"><img src="${iconSrc}" alt="${n||lbl}" loading="lazy"></div>`;
    h+=`<div class="sc-label">${lbl}</div>`;
    if(n)h+=`<div class="sc-name" data-en="${n}">${tn(n)}</div>`;
    h+=`</div>`;
    return h;
  }
  let gh='';
  gh+=`<div style="grid-column:2;grid-row:1">${slotHtml('helmet')}</div>`;
  gh+=`<div style="grid-column:1;grid-row:2/span 2;align-self:center;margin-top:-8px">${slotHtml('weapon')}</div>`;
  gh+=`<div style="grid-column:1;grid-row:3/span 2;align-self:center">${slotHtml('acc1')}</div>`;
  gh+=`<div style="grid-column:2;grid-row:2">${slotHtml('chest')}</div>`;
  gh+=`<div style="grid-column:2;grid-row:3">${slotHtml('pants')}</div>`;
  gh+=`<div style="grid-column:2;grid-row:4">${slotHtml('boots')}</div>`;
  gh+=`<div style="grid-column:3;grid-row:2/span 2;align-self:center;margin-top:-8px">${slotHtml('gloves')}</div>`;
  gh+=`<div style="grid-column:3;grid-row:3/span 2;align-self:center">${slotHtml('acc2')}</div>`;
  grid.innerHTML=gh;
  grid.querySelectorAll('.b-slot-cell').forEach(c=>{
    c.addEventListener('click',e=>{
      if(e.target.closest('.sc-remove'))return;
      if(e.target.closest('.crit-diamond'))return;
      const sk=c.dataset.sk;
      const current=builder.slots[sk];
      builder.selectedSlot=sk;
      if(current){
        builder.viewingItem=current;
        builder.viewingSlot=sk;
      } else {
        builder.viewingItem=null;
        builder.viewingSlot=null;
      }
      renderBuilder();
    });
  });
  grid.querySelectorAll('.sc-remove').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      const sk=b.dataset.sk;
      delete builder.slots[sk];
      delete builder.crits[sk];
      if(builder.viewingSlot===sk)builder.viewingSlot=null;
      if(builder.viewingItem&&!builder.slots[sk])builder.viewingItem=null;
      renderBuilder();
    });
  });
  grid.querySelectorAll('.crit-diamond').forEach(d=>{
    d.addEventListener('click',e=>{
      if(builder.costMode)return;
      e.stopPropagation();
      const sk=d.closest('.b-slot-cell').dataset.sk;
      builder.crits[sk]=!builder.crits[sk];
      renderBuilder();
    });
  });

  if(builder.costMode){
    const costAgg=calcBuilderCost();
    const costHtml=renderCostTotalHtml(costAgg);
    document.getElementById('builderStats').innerHTML=`<div class="section-title">${t('cost_mats')}</div>${costHtml}`;
  } else {
    const statsHtml=calcBuilderStats();
    const emptyMsg=lang==='ru'?'Снарядите предметы для просмотра статов':'Equip items to see stats';
    document.getElementById('builderStats').innerHTML=`<div class="section-title">${lang==='ru'?'Суммарные статы':'Total Stats'}</div>${statsHtml||`<div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-muted);padding:8px 4px">${emptyMsg}</div>`}`;
  }

  const detailEl=document.getElementById('builderItemDetail');
  detailEl.dataset.placeholder=lang==='ru'?'Нажмите на предмет в слоте':'Click an item in a slot';
  if(builder.viewingItem){
    if(builder.costMode)detailEl.innerHTML=itemCostHtml(builder.viewingItem);
    else detailEl.innerHTML=itemDetailHtml(builder.viewingItem,builder.crits[builder.viewingSlot]);
  } else detailEl.innerHTML='';

  renderItemList();
}

function renderItemList(){
  const allNames=Object.keys(SLOT_MAP);
  const troopTypes=['infantry','cavalry','archer','siege'];
  const slotTypes=[...new Set(Object.values(SLOT_MAP))];
  const rarityTypes=['Legendary','Epic','Elite','Advanced','Common'];

  const f=builder.filters;
  let filtered=allNames.filter(n=>{
    if(builder.costMode && !ITEM_COST_MAP[n])return false;
    if(f.search && !n.toLowerCase().includes(f.search.toLowerCase()) && !tn(n).toLowerCase().includes(f.search.toLowerCase()))return false;
    if(f.troop.size && !f.troop.has(getItemTroop(n)))return false;
    if(f.slot.size && !f.slot.has(SLOT_MAP[n]))return false;
    if(f.rarity.size && !f.rarity.has(RARITY_MAP[n]||''))return false;
    return true;
  }).sort((a,b)=>{
    const ra=RARITY_MAP[a]||'',rb=RARITY_MAP[b]||'';
    const order={Legendary:5,Epic:4,Elite:3,Advanced:2,Common:1};
    return (order[rb]||0)-(order[ra]||0) || a.localeCompare(b);
  });

  const esc=str=>str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // render filter buttons
  let fh='';
  troopTypes.forEach(t=>{
    const on=f.troop.has(t);
    const label=lang==='ru'?{infantry:'Пехота',cavalry:'Кавалерия',archer:'Лучники',siege:'Осадные'}[t]:t.charAt(0).toUpperCase()+t.slice(1);
    fh+=`<button class="il-filter${on?' on':''}" data-filter-type="troop" data-filter-val="${t}">${label}</button>`;
  });
  fh+=`<span class="il-sep">|</span>`;
  slotTypes.forEach(sk=>{
    const on=f.slot.has(sk);
    const label=lang==='ru'?(SLOT_KEYS_RU[sk]||sk):(tt(SLOT_KEYS[sk])||sk);
    fh+=`<button class="il-filter${on?' on':''}" data-filter-type="slot" data-filter-val="${sk}">${label}</button>`;
  });
  fh+=`<span class="il-sep">|</span>`;
  rarityTypes.forEach(r=>{
    const on=f.rarity.has(r);
    fh+=`<button class="il-filter${on?' on':''}" data-filter-type="rarity" data-filter-val="${r}">${r}</button>`;
  });
  document.getElementById('ilFilters').innerHTML=fh;

  document.querySelectorAll('#ilFilters .il-filter').forEach(b=>{
    b.addEventListener('click',()=>{
      const type=b.dataset.filterType;
      const val=b.dataset.filterVal;
      if(builder.filters[type].has(val))builder.filters[type].delete(val);
      else builder.filters[type].add(val);
      renderItemList();
    });
  });

  // render item grid
  let gh='';
  filtered.forEach(n=>{
    const sk=SLOT_MAP[n];
    const rarity=RARITY_MAP[n]||'';
    const icon=ICON_MAP[n]||BASE_ICONS[sk]||'';
    const eq=Object.values(builder.slots).includes(n);
    gh+=`<div class="il-item${eq?' eq':''} r-${rarity}" data-item-name="${esc(n)}" data-item-slot="${sk}">`;
    if(icon)gh+=`<img src="${icon}" alt="" loading="lazy">`;
    gh+=`<span class="il-name">${esc(tn(n))}</span>`;
    if(rarity)gh+=`<span class="il-tag">${rarity.charAt(0)}</span>`;
    gh+=`</div>`;
  });
  document.getElementById('ilGrid').innerHTML=gh;

  document.querySelectorAll('#ilGrid .il-item').forEach(c=>{
    c.addEventListener('click',()=>{
      const name=c.dataset.itemName;
      const itemSlot=c.dataset.itemSlot;
      let sk;
      if(itemSlot==='acc'){
        const inAcc1=builder.slots['acc1']===name;
        const inAcc2=builder.slots['acc2']===name;
        if(builder.selectedSlot && (builder.selectedSlot==='acc1' || builder.selectedSlot==='acc2')){
          sk=builder.selectedSlot;
          const otherSk=sk==='acc1'?'acc2':'acc1';
          if(builder.slots[sk]===name){
            delete builder.slots[sk];
          } else if(builder.slots[otherSk]===name){
            delete builder.slots[otherSk];
            builder.slots[sk]=name;
          } else {
            builder.slots[sk]=name;
          }
        } else if(inAcc1 || inAcc2){
          if(inAcc1)delete builder.slots['acc1'];
          if(inAcc2)delete builder.slots['acc2'];
        } else {
          sk=!builder.slots['acc1']?'acc1':(!builder.slots['acc2']?'acc2':'acc1');
          builder.slots[sk]=name;
        }
      } else {
        sk=builder.selectedSlot&&itemSlot===builder.selectedSlot?builder.selectedSlot:itemSlot;
        if(builder.slots[sk]===name){delete builder.slots[sk]}
        else{builder.slots[sk]=name}
      }
      builder.viewingItem=null;
      builder.selectedSlot=null;
      renderBuilder();
    });
  });
}

document.querySelectorAll('.mode-btn').forEach(b=>{
  b.addEventListener('click',()=>switchMode(b.dataset.mode));
});
document.getElementById('ilSearch').addEventListener('input',e=>{
  builder.filters.search=e.target.value;
  renderItemList();
});
document.getElementById('ilSearch').placeholder=lang==='ru'?'Поиск...':'Search...';
applyLang();
renderTabs();
</script>
