<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="page_title">Калькулятор очков действий</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;600&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --neon-yellow:#ffe600;--neon-gold:#ffdd00;--neon-amber:#ffb300;--neon-red:#ff1030;
  --dark-bg:#0a0a0f;--panel-bg:#12121a;--card-bg:#1a1a2e;--input-bg:#0d0d1a;
  --border-glow:rgba(255,230,0,0.3);
  --text-primary:#fff8dc;--text-dim:#e0d8b0;--text-muted:#c0b080;
  --font-display:'Orbitron',monospace;--font-body:'Rajdhani',sans-serif;--font-mono:'Fira Code',monospace;
}
body{background:var(--dark-bg);color:var(--text-primary);font-family:var(--font-body);min-height:100vh;overflow-x:hidden;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(rgba(255,230,0,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,230,0,0.05) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0}
.app{position:relative;z-index:2;max-width:460px;width:92%;padding:20px;text-align:center}
.header{margin-bottom:28px}
.header h1{font-family:var(--font-display);font-size:1.6rem;font-weight:900;text-transform:uppercase;letter-spacing:4px;
  background:linear-gradient(135deg,var(--neon-yellow),var(--neon-amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 30px rgba(255,230,0,0.4))}
.header .subtitle{font-family:var(--font-display);font-size:0.6rem;letter-spacing:6px;color:var(--text-dim);margin-top:6px;text-transform:uppercase}
.glitch-line{height:2px;background:linear-gradient(90deg,transparent,var(--neon-yellow),var(--neon-gold),transparent);margin:10px auto 0;max-width:300px;box-shadow:0 0 20px rgba(255,230,0,0.3)}
.panel{background:var(--panel-bg);border:1px solid var(--border-glow);border-radius:4px;padding:20px;box-shadow:0 0 20px rgba(255,230,0,0.06),inset 0 0 30px rgba(255,230,0,0.03)}
.panel-title{font-family:var(--font-display);font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--neon-yellow);margin-bottom:16px;text-align:left}
.panel-title::before{content:'> ';color:var(--neon-gold)}
.row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.row label{font-family:var(--font-display);font-size:0.6rem;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);min-width:140px;text-align:right}
.row input{font-family:var(--font-mono);font-size:1rem;padding:8px 10px;background:var(--input-bg);border:1px solid rgba(255,230,0,0.25);color:var(--text-primary);border-radius:3px;outline:none;transition:border-color 0.2s;width:100px;text-align:right}
.row input:focus{border-color:var(--neon-yellow);box-shadow:0 0 15px rgba(255,230,0,0.15)}
.bottle-icon{min-width:24px;text-align:center;display:flex;align-items:center;justify-content:center}
.btn{font-family:var(--font-body);font-weight:700;font-size:1rem;padding:10px 30px;border:none;border-radius:3px;cursor:pointer;text-transform:uppercase;letter-spacing:2px;transition:all 0.2s}
.btn-primary{background:linear-gradient(135deg,var(--neon-yellow),var(--neon-amber));color:#000;box-shadow:0 0 20px rgba(255,230,0,0.3)}
.btn-primary:hover{box-shadow:0 0 40px rgba(255,230,0,0.5);transform:translateY(-1px)}
.result-box{margin-top:18px;padding:14px;background:rgba(255,230,0,0.06);border:1px solid rgba(255,230,0,0.2);border-radius:3px}
.result-box .result-label{font-family:var(--font-display);font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}
.result-box .result-value{font-family:var(--font-mono);font-size:1.6rem;font-weight:700;color:var(--neon-yellow);margin-top:4px;text-shadow:0 0 20px rgba(255,230,0,0.4)}
.lang-switch{position:fixed;top:4px;right:8px;display:flex;gap:2px;z-index:10}
.lang-btn{font-family:var(--font-mono);font-size:0.55rem;padding:3px 7px;background:var(--input-bg);border:1px solid rgba(255,230,0,0.2);color:var(--text-muted);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:1px}
.lang-btn:first-child{border-radius:3px 0 0 3px}
.lang-btn:last-child{border-radius:0 3px 3px 0}
.lang-btn.active{background:var(--neon-yellow);color:#000;border-color:var(--neon-yellow)}
.lang-btn:hover:not(.active){border-color:var(--neon-yellow)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--dark-bg)}
::-webkit-scrollbar-thumb{background:var(--neon-yellow);border-radius:3px}
@media(max-width:480px){
  .header h1{font-size:1.2rem}
  .row{flex-wrap:wrap;gap:6px}
  .row label{min-width:100px;font-size:0.5rem;text-align:left}
  .app{padding:12px}
  .result-box .result-value{font-size:1.2rem}
}
</style>
</head>
<body>
<div class="lang-switch">
  <button class="lang-btn" data-lang="ru">RU</button>
  <button class="lang-btn" data-lang="en">EN</button>
</div>
<div class="app">
  <header class="header">
    <div style="text-align:left;margin-bottom:4px">
      <a href="index.html" style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-muted);text-decoration:none;letter-spacing:1px" data-i18n="back">← Главная</a>
    </div>
    <h1 data-i18n="h1">КАЛЬКУЛЯТОР БУТЫЛЬКОВ</h1>
    <div class="subtitle" data-i18n="subtitle">Action Points Calculator</div>
    <div class="glitch-line"></div>
  </header>

  <div class="panel">
    <div class="panel-title" data-i18n="title">Введите количество</div>

    <div class="row">
      <span class="bottle-icon"><img src="APX.png" alt="AP" style="width:1.2rem;height:1.2rem;vertical-align:middle"></span>
      <label data-i18n="b50">Бутыльки на 50</label>
      <input type="number" id="q50" value="" min="0" step="1">
      <span class="badge" style="background:#2e7d32;color:#fff;font-family:var(--font-mono);font-size:0.55rem;border-radius:2px;padding:2px 6px">×50</span>
    </div>
    <div class="row">
      <span class="bottle-icon"><img src="APX.png" alt="AP" style="width:1.2rem;height:1.2rem;vertical-align:middle"></span>
      <label data-i18n="b100">Бутыльки на 100</label>
      <input type="number" id="q100" value="" min="0" step="1">
      <span class="badge" style="background:#2e7d32;color:#fff;font-family:var(--font-mono);font-size:0.55rem;border-radius:2px;padding:2px 6px">×100</span>
    </div>
    <div class="row">
      <span class="bottle-icon"><img src="APX.png" alt="AP" style="width:1.2rem;height:1.2rem;vertical-align:middle"></span>
      <label data-i18n="b500">Бутыльки на 500</label>
      <input type="number" id="q500" value="" min="0" step="1">
      <span class="badge" style="background:#1565c0;color:#fff;font-family:var(--font-mono);font-size:0.55rem;border-radius:2px;padding:2px 6px">×500</span>
    </div>
    <div class="row">
      <span class="bottle-icon"><img src="APX.png" alt="AP" style="width:1.2rem;height:1.2rem;vertical-align:middle"></span>
      <label data-i18n="b1000">Бутыльки на 1000</label>
      <input type="number" id="q1000" value="" min="0" step="1">
      <span class="badge" style="background:#7b1fa2;color:#fff;font-family:var(--font-mono);font-size:0.55rem;border-radius:2px;padding:2px 6px">×1000</span>
    </div>

    <div style="text-align:center;margin-top:6px">
      <button class="btn btn-primary" id="calcBtn" data-i18n="calc_btn">[ РАССЧИТАТЬ ]</button>
    </div>

    <div class="result-box" id="resultBox" style="display:none">
      <div class="result-label" data-i18n="total">Итого очков действий</div>
      <div class="result-value" id="resultValue">0</div>
    </div>
  </div>
</div>

<script>
const LANG={ru:{
  back:'← Главная',h1:'КАЛЬКУЛЯТОР БУТЫЛЬКОВ',subtitle:'Action Points Calculator',
  title:'Введите количество',
  b50:'Бутыльки на 50',b100:'Бутыльки на 100',b500:'Бутыльки на 500',b1000:'Бутыльки на 1000',
  calc_btn:'[ РАССЧИТАТЬ ]',total:'Итого очков действий',
},en:{
  back:'← Home',h1:'AP BOTTLE CALCULATOR',subtitle:'Калькулятор бутыльков',
  title:'Enter quantities',
  b50:'Bottles x50',b100:'Bottles x100',b500:'Bottles x500',b1000:'Bottles x1000',
  calc_btn:'[ CALCULATE ]',total:'Total Action Points',
}};
const detected=navigator.language.startsWith('ru')?'ru':'en';
let lang=localStorage.getItem('lang')||detected;
function t(k){return LANG[lang][k]||k}
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(LANG[lang][k])el.textContent=LANG[lang][k]});
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  document.documentElement.lang=lang;
}
document.querySelectorAll('.lang-btn').forEach(b=>{
  b.addEventListener('click',()=>{lang=b.dataset.lang;localStorage.setItem('lang',lang);applyLang()})
});
applyLang();

const $=id=>document.getElementById(id);
const q50=$('q50'),q100=$('q100'),q500=$('q500'),q1000=$('q1000');
const resultBox=$('resultBox'),resultValue=$('resultValue');

function fmt(n){return Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')}

$('calcBtn').addEventListener('click',()=>{
  const v50=parseInt(q50.value)||0;
  const v100=parseInt(q100.value)||0;
  const v500=parseInt(q500.value)||0;
  const v1000=parseInt(q1000.value)||0;
  const total=v50*50+v100*100+v500*500+v1000*1000;
  resultValue.textContent=fmt(total);
  resultBox.style.display='';
});
</script>
</body>
</html>
