<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEAL CALCULATOR — Troop Healing Time</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --neon-yellow: #ffe600;
  --neon-gold: #ffdd00;
  --neon-amber: #ffb300;
  --neon-red: #ff1030;
  --neon-green: #00ff88;
  --neon-cyan: #00f0ff;
  --dark-bg: #0a0a0f;
  --panel-bg: #12121a;
  --card-bg: #1a1a2e;
  --input-bg: #0d0d1a;
  --border-glow: rgba(255, 230, 0, 0.3);
  --text-primary: #fff8dc;
  --text-dim: #e0d8b0;
  --text-muted: #c0b080;
  --font-display: 'Orbitron', monospace;
  --font-body: 'Rajdhani', sans-serif;
  --font-mono: 'Fira Code', monospace;
}

body {
  background: var(--dark-bg);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    linear-gradient(rgba(255, 230, 0, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 230, 0, 0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
  pointer-events: none;
  z-index: 1;
}

.app { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 20px; }

.header {
  text-align: center;
  padding: 30px 0 20px;
}
.header h1 {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--neon-yellow), var(--neon-amber));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 30px rgba(255, 230, 0, 0.4));
}
.header .subtitle {
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 6px;
  color: var(--text-dim);
  margin-top: 6px;
  text-transform: uppercase;
}
.glitch-line {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-yellow), var(--neon-gold), transparent);
  margin: 12px 0 0;
  box-shadow: 0 0 20px rgba(255, 230, 0, 0.4);
}

.panel {
  background: var(--panel-bg);
  border: 1px solid var(--border-glow);
  border-radius: 4px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 0 20px rgba(255, 230, 0, 0.06), inset 0 0 30px rgba(255, 230, 0, 0.03);
}
.panel-title {
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--neon-yellow);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-title::before { content: '>'; color: var(--neon-gold); font-weight: 700; }

.row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
.col { display: flex; flex-direction: column; gap: 6px; }

label {
  font-family: var(--font-display);
  font-size: 0.6rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  display: block;
  margin-bottom: 4px;
}

input {
  font-family: var(--font-body);
  font-size: 1rem;
  padding: 8px 12px;
  background: var(--input-bg);
  border: 1px solid rgba(255, 230, 0, 0.25);
  color: var(--text-primary);
  border-radius: 3px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
input:focus {
  border-color: var(--neon-yellow);
  box-shadow: 0 0 15px rgba(255, 230, 0, 0.15);
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: rgba(255, 230, 0, 0.2);
  border: none;
  border-radius: 2px;
  outline: none;
  padding: 0;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--neon-yellow);
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255, 230, 0, 0.4);
}

.troop-inputs {
  display: flex;
  gap: 12px;
}
.troop-input-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}
.troop-input-group label {
  font-size: 0.65rem;
  white-space: nowrap;
}
.troop-input-group input { text-align: center; }

.tier-divider {
  font-family: var(--font-display);
  font-size: 0.6rem;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-align: center;
  padding: 6px 0 4px;
}

.handles-row { display: flex; align-items: center; gap: 14px; }
.handles-row input[type="range"] { flex: 1; }
.handles-value {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--neon-yellow);
  min-width: 50px;
  text-align: center;
}
.handles-pct {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-muted);
  min-width: 120px;
  text-align: right;
}

.result-panel {
  text-align: center;
  padding: 24px 20px;
}
.result-time {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 700;
  color: var(--neon-yellow);
  text-shadow: 0 0 30px rgba(255, 230, 0, 0.3);
  margin: 8px 0;
}
.result-label {
  font-family: var(--font-display);
  font-size: 0.65rem;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
}
.result-detail {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-top: 6px;
}
.result-detail span { color: var(--neon-green); }
.result-table {
  margin-top: 16px;
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 0.85rem;
}
.result-table th {
  font-family: var(--font-display);
  font-size: 0.55rem;
  letter-spacing: 1px;
  color: var(--text-muted);
  text-transform: uppercase;
  padding: 8px 10px;
  border-bottom: 1px solid rgba(255, 230, 0, 0.15);
  text-align: right;
}
.result-table th:first-child { text-align: left; }
.result-table td {
  padding: 8px 10px;
  border-bottom: 1px solid rgba(255, 230, 0, 0.06);
  text-align: right;
}
.result-table td:first-child { text-align: left; color: var(--neon-yellow); font-weight: 600; }
.result-table tr:last-child td { border-bottom: none; }

.result-table .tier-row { border-top: 1px solid rgba(255, 230, 0, 0.12); }

.t5-highlight { color: var(--neon-cyan) !important; }

@keyframes flicker {
  0%, 88%, 92%, 96%, 100% { opacity: 1; }
  90%, 94% { opacity: 0.85; }
}
.flicker { animation: flicker 4s infinite; }
.flicker-glow { animation: flicker-glow 4s infinite; }

/* LANG SWITCHER */
.lang-switch {
  position: absolute;
  top: 12px; right: 12px;
  display: flex;
  gap: 2px;
  z-index: 10;
}
.lang-btn {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 3px 8px;
  background: var(--input-bg);
  border: 1px solid rgba(255, 230, 0, 0.2);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.lang-btn:first-child { border-radius: 3px 0 0 3px; }
.lang-btn:last-child { border-radius: 0 3px 3px 0; }
.lang-btn.active {
  background: var(--neon-yellow);
  color: #000;
  border-color: var(--neon-yellow);
}
.lang-btn:hover:not(.active) { border-color: var(--neon-yellow); }

/* CYBER BANNER (Small Logo) */
.cyber-banner-small {
  width: 100%;
  max-width: 160px;
  margin: 0 auto 20px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid rgba(255, 230, 0, 0.3);
  box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05);
  position: relative;
  background: var(--panel-bg);
  padding: 10px;
}
.cyber-banner-small::before {
  content: '';
  position: absolute;
  top: -5px; left: -5px; right: -5px; bottom: -5px;
  border-radius: 50%;
  background: linear-gradient(45deg, rgba(255, 230, 0, 0.1), transparent, rgba(255, 230, 0, 0.1));
  animation: rotate 8s linear infinite;
  pointer-events: none;
}
.cyber-banner-small img {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 50%;
  position: relative;
  z-index: 1;
}
.cyber-banner-small::after {
  content: '';
  position: absolute;
  top: 10px; left: 10px; right: 10px; bottom: 10px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255, 230, 0, 0.1), transparent 45%, transparent 55%, rgba(255, 230, 0, 0.03));
  animation: shimmer 6s linear infinite;
  pointer-events: none;
  z-index: 2;
}

@keyframes shimmer {
  to { transform: rotate(360deg); }
}
@keyframes rotate {
  to { transform: rotate(360deg); }
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--dark-bg); }
::-webkit-scrollbar-thumb { background: var(--neon-yellow); border-radius: 3px; }

@media (max-width: 768px) {
  .header h1 { font-size: 1.4rem; letter-spacing: 2px; }
  .troop-inputs { flex-wrap: wrap; }
  .troop-input-group { min-width: 120px; }
  .result-time { font-size: 1.4rem; }
}
</style>
</head>
<body>

<div class="app" id="app" style="position:relative;">
  <div class="lang-switch">
    <button class="lang-btn" data-lang="ru">RU</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>
  <header class="header">
    <div style="text-align:left;margin-bottom:4px;">
      <a href="index.html" style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);text-decoration:none;letter-spacing:1px;" data-i18n="back">← Главная</a>
    </div>
    <h1 class="flicker">HEAL CALCULATOR</h1>
    <div class="subtitle" data-i18n="subtitle">Troop Healing Time Calculator</div>
    <div class="glitch-line"></div>
  </header>

   <!-- CYBER BANNER (Small Logo) -->
   <div class="cyber-banner-small flicker-glow">
     <img src="logo.png" alt="HEAL CALCULATOR" loading="lazy" onerror="this.style.display='none'">
   </div>

  <!-- TROOP COUNTS -->
  <div class="panel">
    <div class="panel-title" data-i18n="troops">Количество войск</div>

    <div class="troop-inputs" style="margin-bottom:8px;">
      <div class="troop-input-group">
        <label data-i18n="inf4">⚔️ Пехота T4</label>
        <input type="number" id="countInfantry4" value="0" min="0">
      </div>
      <div class="troop-input-group">
        <label data-i18n="arc4">🏹 Луки T4</label>
        <input type="number" id="countArchers4" value="0" min="0">
      </div>
      <div class="troop-input-group">
        <label data-i18n="cav4">🐴 Кони T4</label>
        <input type="number" id="countCavalry4" value="0" min="0">
      </div>
      <div class="troop-input-group">
        <label data-i18n="sie4">💥 Осада T4</label>
        <input type="number" id="countSiege4" value="0" min="0">
      </div>
    </div>

    <div class="troop-inputs">
      <div class="troop-input-group">
        <label data-i18n="inf5">⚔️ Пехота T5</label>
        <input type="number" id="countInfantry5" value="0" min="0">
      </div>
      <div class="troop-input-group">
        <label data-i18n="arc5">🏹 Луки T5</label>
        <input type="number" id="countArchers5" value="0" min="0">
      </div>
      <div class="troop-input-group">
        <label data-i18n="cav5">🐴 Кони T5</label>
        <input type="number" id="countCavalry5" value="0" min="0">
      </div>
      <div class="troop-input-group">
        <label data-i18n="sie5">💥 Осада T5</label>
        <input type="number" id="countSiege5" value="0" min="0">
      </div>
    </div>
  </div>

  <!-- BONUSES -->
  <div class="panel">
    <div class="panel-title" data-i18n="bonuses">Бонусы</div>
    <div class="row" style="gap:24px;">
      <div class="col" style="min-width:140px;">
        <label data-i18n="speed_label">Скорость лечения</label>
        <input type="number" id="speedBonus" value="0" min="0" max="100" style="width:100px;text-align:center;">
        <span style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);" data-i18n="speed_unit">% ускорения</span>
      </div>
      <div class="col" style="min-width:140px;">
        <label data-i18n="resource_label">Потребление ресурсов</label>
        <input type="number" id="resourceBonus" value="0" min="0" max="100" style="width:100px;text-align:center;">
        <span style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);" data-i18n="resource_unit">% экономии</span>
      </div>
      <div class="col" style="flex:1;min-width:200px;">
        <label data-i18n="handles_label">Ручки лечения</label>
        <div class="handles-row">
          <span style="font-size:0.8rem;color:var(--text-muted);">0</span>
          <input type="range" id="handlesSlider" min="0" max="30" value="0">
          <span style="font-size:0.8rem;color:var(--text-muted);">30</span>
          <span class="handles-value" id="handlesDisplay">0</span>
          <span class="handles-pct" id="handlesPct">− 0 мин</span>
        </div>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="panel result-panel" id="resultPanel">
    <div class="result-label" data-i18n="result_label">Общее время лечения</div>
    <div class="result-time" id="resultTime">—</div>
    <div class="result-detail" id="resultDetail"></div>

    <table class="result-table" id="resultTable">
      <thead>
        <tr>
          <th data-i18n="type">Тип</th>
          <th data-i18n="troops_count">Воинов</th>
          <th data-i18n="time">Время</th>
        </tr>
      </thead>
      <tbody id="resultBody"></tbody>
    </table>
  </div>

  <!-- RESOURCE COST -->
  <div class="panel" id="costPanel">
    <div class="panel-title" data-i18n="cost_title">Стоимость лечения</div>
    <table class="result-table" id="costTable">
      <thead>
        <tr>
          <th data-i18n="type">Тип</th>
          <th data-i18n="food">🍖 Пища</th>
          <th data-i18n="wood">🪵 Дерево</th>
          <th data-i18n="stone">🪨 Камень</th>
          <th data-i18n="gold">🪙 Золото</th>
        </tr>
      </thead>
      <tbody id="costBody"></tbody>
      <tfoot id="costFoot"></tfoot>
    </table>
  </div>
</div>

<script>
const LANG = {
  ru: {
    back: '← Главная', subtitle: 'Troop Healing Time Calculator',
    troops: 'Количество войск', bonuses: 'Бонусы',
    speed_label: 'Скорость лечения', speed_unit: '% ускорения',
    resource_label: 'Потребление ресурсов', resource_unit: '% экономии',
    handles_label: 'Ручки лечения',
    inf4: '⚔️ Пехота T4', arc4: '🏹 Луки T4', cav4: '🐴 Кони T4', sie4: '💥 Осада T4',
    inf5: '⚔️ Пехота T5', arc5: '🏹 Луки T5', cav5: '🐴 Кони T5', sie5: '💥 Осада T5',
    result_label: 'Общее время лечения',
    type: 'Тип', troops_count: 'Воинов', time: 'Время',
    cost_title: 'Стоимость лечения',
    food: '🍖 Пища', wood: '🪵 Дерево', stone: '🪨 Камень', gold: '🪙 Золото',
    total: 'ИТОГО',
    zero_min: '− 0 мин', floor_hint: ' (есть 180с)',
    total_troops: 'Всего воинов', speed_prefix: 'Скорость +', speed_suffix: '%',
    no_handles: 'Без ручек', with_handles: 'С ручками',
    sec: 'с', min: 'м', hr: 'ч', day: 'д',
    short_sec: 'сек.', short_min: 'мин.', short_hr: 'ч.', short_day: 'д.',
  },
  en: {
    back: '← Home', subtitle: 'Troop Healing Time Calculator',
    troops: 'Troop Count', bonuses: 'Bonuses',
    speed_label: 'Healing Speed', speed_unit: '% speed',
    resource_label: 'Resource Consumption', resource_unit: '% saving',
    handles_label: 'Healing Handles',
    inf4: '⚔️ Infantry T4', arc4: '🏹 Archers T4', cav4: '🐴 Cavalry T4', sie4: '💥 Siege T4',
    inf5: '⚔️ Infantry T5', arc5: '🏹 Archers T5', cav5: '🐴 Cavalry T5', sie5: '💥 Siege T5',
    result_label: 'Total Healing Time',
    type: 'Type', troops_count: 'Troops', time: 'Time',
    cost_title: 'Healing Cost',
    food: '🍖 Food', wood: '🪵 Wood', stone: '🪨 Stone', gold: '🪙 Gold',
    total: 'TOTAL',
    zero_min: '− 0 min', floor_hint: ' (180s floor)',
    total_troops: 'Total troops', speed_prefix: 'Speed +', speed_suffix: '%',
    no_handles: 'No handles', with_handles: 'With handles',
    sec: 's', min: 'm', hr: 'h', day: 'd',
    short_sec: 's', short_min: 'm', short_hr: 'h', short_day: 'd',
  },
};

const detected = navigator.language.startsWith('ru') ? 'ru' : 'en';
let lang = localStorage.getItem('lang') || detected;

function t(key) { return LANG[lang][key] || key; }

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (LANG[lang][key]) el.textContent = LANG[lang][key];
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  document.documentElement.lang = lang;
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    lang = btn.dataset.lang;
    localStorage.setItem('lang', lang);
    applyLang();
    calculate();
  });
});

applyLang();
const FREE_SECONDS_PER_HANDLE = 180;

const TROOPS = [
  { id: 'Infantry4', labelKey: 'inf4', icon: '⚔️', tier: 4, countEl: null, seconds: 3, cost: { food: 120, wood: 120, stone: 0, gold: 8 } },
  { id: 'Archers4',  labelKey: 'arc4', icon: '🏹', tier: 4, countEl: null, seconds: 3, cost: { food: 0,   wood: 120, stone: 90, gold: 8 } },
  { id: 'Cavalry4',  labelKey: 'cav4', icon: '🐴', tier: 4, countEl: null, seconds: 3, cost: { food: 120, wood: 0,   stone: 90, gold: 8 } },
  { id: 'Siege4',    labelKey: 'sie4', icon: '💥', tier: 4, countEl: null, seconds: 3, cost: { food: 80,  wood: 80,  stone: 60, gold: 8 } },
  { id: 'Infantry5', labelKey: 'inf5', icon: '⚔️', tier: 5, countEl: null, seconds: 4, cost: { food: 320, wood: 320, stone: 0,   gold: 160 } },
  { id: 'Archers5',  labelKey: 'arc5', icon: '🏹', tier: 5, countEl: null, seconds: 4, cost: { food: 0,   wood: 320, stone: 240, gold: 160 } },
  { id: 'Cavalry5',  labelKey: 'cav5', icon: '🐴', tier: 5, countEl: null, seconds: 4, cost: { food: 320, wood: 0,   stone: 240, gold: 160 } },
  { id: 'Siege5',    labelKey: 'sie5', icon: '💥', tier: 5, countEl: null, seconds: 4, cost: { food: 200, wood: 200, stone: 160, gold: 160 } },
];

const handlesSlider = document.getElementById('handlesSlider');
const handlesDisplay = document.getElementById('handlesDisplay');
const handlesPct = document.getElementById('handlesPct');
const speedBonus = document.getElementById('speedBonus');
const resourceBonus = document.getElementById('resourceBonus');
const resultTime = document.getElementById('resultTime');
const resultDetail = document.getElementById('resultDetail');
const resultBody = document.getElementById('resultBody');
const costBody = document.getElementById('costBody');
const costFoot = document.getElementById('costFoot');

TROOPS.forEach(t => {
  t.countEl = document.getElementById('count' + t.id);
});

function fmtTimeShort(seconds) {
  seconds = Math.floor(seconds);
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  const parts = [];
  if (h > 0) parts.push(`${h} ${t('hr')}`);
  if (m > 0) parts.push(`${m} ${t('min')}`);
  if (s > 0 || parts.length === 0) parts.push(`${s} ${t('sec')}`);
  return parts.join(' ');
}

function fmtTime(totalSeconds) {
  if (totalSeconds < 0) totalSeconds = 0;
  const d = Math.floor(totalSeconds / 86400);
  const h = Math.floor((totalSeconds % 86400) / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = Math.floor(totalSeconds % 60);
  const parts = [];
  if (d > 0) parts.push(`${d} ${t('short_day')}`);
  if (h > 0) parts.push(`${h} ${t('short_hr')}`);
  if (m > 0) parts.push(`${m} ${t('short_min')}`);
  parts.push(`${s} ${t('short_sec')}`);
  return parts.join(' ');
}

function fmtNum(n) { return Math.floor(n).toLocaleString('ru-RU'); }

function calculate() {
  const handles = parseInt(handlesSlider.value) || 0;
  const bonusPct = parseFloat(speedBonus.value) || 0;
  handlesDisplay.textContent = handles;

  const counts = TROOPS.map(t => parseInt(t.countEl.value) || 0);

  const totalT4 = counts.slice(0, 4).reduce((a, b) => a + b, 0);
  const totalT5 = counts.slice(4, 8).reduce((a, b) => a + b, 0);
  const totalTroops = totalT4 + totalT5;

  if (totalTroops === 0) {
    costBody.innerHTML = '';
    costFoot.innerHTML = '';
    handlesPct.textContent = t('zero_min');
    resultBody.innerHTML = '';
    resultDetail.innerHTML = '';
    resultTime.textContent = fmtTime(0);
    return;
  }

  // Calculate raw seconds per tier
  const rawT4 = TROOPS.slice(0, 4).reduce((sum, t, i) => sum + counts[i] * t.seconds, 0);
  const rawT5 = TROOPS.slice(4, 8).reduce((sum, t, i) => sum + counts[4 + i] * t.seconds, 0);
  const rawSeconds = rawT4 + rawT5;
  const baseSeconds = rawSeconds / (1 + bonusPct / 100);

  // Step-by-step handle logic (official Alliance Center mechanic)
  let time = baseSeconds;
  let actualCuts = 0;
  for (let i = 0; i < handles; i++) {
    const onePct = time * 0.01;
    const cut = Math.max(onePct, FREE_SECONDS_PER_HANDLE);
    time -= cut;
    actualCuts += cut;
  }
  const resultSeconds = Math.max(0, time);
  const savedSeconds = rawSeconds - resultSeconds;

  // Determine if any handle hit the 180s floor
  const anyFloor = handles > 0 && (baseSeconds * 0.01) < FREE_SECONDS_PER_HANDLE;
  handlesPct.textContent = handles > 0
    ? `− ${fmtTimeShort(actualCuts)}${anyFloor ? t('floor_hint') : ''}`
    : t('zero_min');

  resultTime.textContent = fmtTime(resultSeconds);

  const row1 = [`${t('total_troops')}: <span>${totalTroops.toLocaleString('ru-RU')}</span>`];
  if (bonusPct > 0) {
    row1.push(`${t('speed_prefix')}${bonusPct}${t('speed_suffix')}: <span>${fmtTime(baseSeconds)}</span>`);
  }

  resultDetail.innerHTML = row1.join(' &nbsp;|&nbsp; ')
    + '<br>'
    + [`${t('no_handles')}: <span>${fmtTime(rawSeconds)}</span>`, `${t('with_handles')}: <span>${fmtTimeShort(savedSeconds)}</span>`].join(' &nbsp;|&nbsp; ');

  // Time table per troop
  resultBody.innerHTML = TROOPS.map((t, i) => {
    const cnt = counts[i];
    if (cnt === 0) return '';
    const troopTime = cnt * t.seconds;
    return `<tr>
      <td>${t.icon} ${t(t.labelKey)}</td>
      <td>${cnt.toLocaleString('ru-RU')}</td>
      <td>${troopTime > 0 ? fmtTime(troopTime) : '—'}</td>
    </tr>`;
  }).join('');

  // Cost table per troop
  const resources = ['food', 'wood', 'stone', 'gold'];
  const resourceMult = resourceBonus.value > 0 ? (1 - parseFloat(resourceBonus.value) / 100) : 1;
  const totals = { food: 0, wood: 0, stone: 0, gold: 0 };

  costBody.innerHTML = TROOPS.map((t, i) => {
    const cnt = counts[i];
    if (cnt === 0) return '';
    resources.forEach(r => { totals[r] += cnt * t.cost[r] * resourceMult; });
    const row = resources.map(r => fmtNum(cnt * t.cost[r] * resourceMult));
    return `<tr><td>${t.icon} ${t(t.labelKey)}</td><td>${row.join('</td><td>')}</td></tr>`;
  }).join('');

  costFoot.innerHTML = `<tr style="border-top:1px solid rgba(255,230,0,0.25);font-weight:700;color:var(--neon-yellow);">
    <td>${t('total')}</td><td>${resources.map(r => fmtNum(totals[r])).join('</td><td>')}</td>
  </tr>`;
}

[handlesSlider, speedBonus, resourceBonus, ...TROOPS.map(t => t.countEl)].forEach(el => {
  el.addEventListener('input', calculate);
});

calculate();
</script>
</body>
</html>
