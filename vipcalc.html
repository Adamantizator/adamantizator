<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="page_title">VIP Calculator — Rise of Kingdoms</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --neon-yellow: #ffe600;
  --neon-gold: #ffdd00;
  --neon-amber: #ffb300;
  --neon-red: #ff1030;
  --neon-green: #00ff88;
  --neon-cyan: #00f0ff;
  --neon-purple: #cc66ff;
  --dark-bg: #0a0a0f;
  --panel-bg: #12121a;
  --card-bg: #1a1a2e;
  --input-bg: #0d0d1a;
  --border-glow: rgba(255, 230, 0, 0.3);
  --text-primary: #fff8dc;
  --text-dim: #e0d8b0;
  --text-muted: #c0b080;
  --font-display: 'Orbitron', monospace;
  --font-body: 'Rajdhani', sans-serif;
  --font-mono: 'Fira Code', monospace;
}

body {
  background: var(--dark-bg);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    linear-gradient(rgba(255, 230, 0, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 230, 0, 0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
  pointer-events: none;
  z-index: 1;
}

.app { position: relative; z-index: 2; max-width: 700px; margin: 0 auto; padding: 20px; }

.header { text-align: center; padding: 30px 0 20px; }
.header h1 {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--neon-yellow), var(--neon-amber));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 30px rgba(255, 230, 0, 0.4));
}
.header .subtitle {
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 6px;
  color: var(--text-dim);
  margin-top: 6px;
  text-transform: uppercase;
}
.glitch-line {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-yellow), var(--neon-gold), transparent);
  margin: 12px 0 0;
  box-shadow: 0 0 20px rgba(255, 230, 0, 0.4);
}

@keyframes flicker {
  0%, 82% { opacity: 1; }
  86% { opacity: 1; }
  90% { opacity: 0.85; }
  94% { opacity: 1; }
  98% { opacity: 0.85; }
  100% { opacity: 1; }
}
.flicker { animation: flicker 4s infinite; }

@keyframes flicker-glow-text {
  0%, 82% { -webkit-text-stroke: 0 transparent; }
  86% { -webkit-text-stroke: 1.5px #ff1030; }
  90% { -webkit-text-stroke: 0 transparent; }
  94% { -webkit-text-stroke: 1.5px #ff1030; }
  98% { -webkit-text-stroke: 0 transparent; }
  100% { -webkit-text-stroke: 0 transparent; }
}
.flicker-glow-text { animation: flicker-glow-text 4s infinite; }

@keyframes flicker-glow {
  0%, 82% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05); }
  86% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05), 0 0 15px rgba(255, 16, 48, 0.5), 0 0 40px rgba(255, 16, 48, 0.2); }
  90% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05); }
  94% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05), 0 0 15px rgba(255, 16, 48, 0.5), 0 0 40px rgba(255, 16, 48, 0.2); }
  98% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05); }
  100% { box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05); }
}
.flicker-glow { animation: flicker-glow 4s infinite; }

.lang-switch {
  position: fixed; top: 2px; right: 8px;
  display: flex; gap: 2px; z-index: 10;
}
.lang-btn {
  font-family: var(--font-mono); font-size: 0.6rem;
  padding: 3px 8px; background: var(--input-bg);
  border: 1px solid rgba(255, 230, 0, 0.2);
  color: var(--text-muted); cursor: pointer;
  transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
}
.lang-btn:first-child { border-radius: 3px 0 0 3px; }
.lang-btn:last-child { border-radius: 0 3px 3px 0; }
.lang-btn.active { background: var(--neon-yellow); color: #000; border-color: var(--neon-yellow); }
.lang-btn:hover:not(.active) { border-color: var(--neon-yellow); }

.cal-btn {
  font-family: var(--font-display); font-size: 0.6rem;
  padding: 3px 8px; background: var(--input-bg);
  border: 1px solid rgba(255, 230, 0, 0.2);
  color: var(--text-muted); cursor: pointer; text-decoration: none;
  text-transform: uppercase; letter-spacing: 1px;
  transition: all 0.2s;
}
.cal-btn:hover { border-color: var(--neon-yellow); color: var(--neon-yellow); }

.cyber-banner-small {
  width: 100%; max-width: 120px;
  margin: 0 auto 20px; border-radius: 50%; overflow: hidden;
  border: 2px solid rgba(255, 230, 0, 0.3);
  box-shadow: 0 0 30px rgba(255, 230, 0, 0.2), inset 0 0 40px rgba(255, 230, 0, 0.05);
  position: relative; background: var(--panel-bg); padding: 8px;
}
.cyber-banner-small::before {
  content: ''; position: absolute;
  top: -5px; left: -5px; right: -5px; bottom: -5px; border-radius: 50%;
  background: linear-gradient(45deg, rgba(255, 230, 0, 0.1), transparent, rgba(255, 230, 0, 0.1));
  animation: rotate 8s linear infinite; pointer-events: none;
}
.cyber-banner-small img {
  display: block; width: 100%; height: auto; border-radius: 50%;
  position: relative; z-index: 1;
}
.cyber-banner-small::after {
  content: ''; position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(255, 230, 0, 0.1), transparent 45%, transparent 55%, rgba(255, 230, 0, 0.03));
  animation: shimmer 6s linear infinite; pointer-events: none; z-index: 2;
}
@keyframes shimmer { to { transform: rotate(360deg); } }
@keyframes rotate { to { transform: rotate(360deg); } }

.panel {
  background: var(--panel-bg);
  border: 1px solid var(--border-glow);
  border-radius: 4px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 0 20px rgba(255, 230, 0, 0.06), inset 0 0 30px rgba(255, 230, 0, 0.03);
}
.panel-title {
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--neon-yellow);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-title::before { content: '>'; color: var(--neon-gold); font-weight: 700; }

label {
  font-family: var(--font-display);
  font-size: 0.6rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  display: block;
  margin-bottom: 4px;
}

input, select {
  font-family: var(--font-body);
  font-size: 1rem;
  padding: 8px 12px;
  background: var(--input-bg);
  border: 1px solid rgba(255, 230, 0, 0.25);
  color: var(--text-primary);
  border-radius: 3px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
input:focus, select:focus {
  border-color: var(--neon-yellow);
  box-shadow: 0 0 15px rgba(255, 230, 0, 0.15);
}
select option { background: var(--dark-bg); color: var(--text-primary); }

.row { display: flex; flex-wrap: wrap; gap: 16px; align-items: end; }
.col { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }

.result-panel { text-align: center; padding: 24px 20px; }

.result-vip-level {
  font-family: var(--font-display);
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--neon-yellow);
  text-shadow: 0 0 30px rgba(255, 230, 0, 0.3);
  margin: 4px 0;
}
.result-label {
  font-family: var(--font-display);
  font-size: 0.65rem;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.progress-bar-bg {
  width: 100%;
  height: 14px;
  background: var(--input-bg);
  border: 1px solid rgba(255, 230, 0, 0.2);
  border-radius: 3px;
  overflow: hidden;
  margin: 12px 0;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--neon-yellow), var(--neon-amber));
  transition: width 0.3s ease;
  border-radius: 2px;
}
.progress-label {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-dim);
}

.result-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}
.result-item {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255, 230, 0, 0.1);
  border-radius: 3px;
  padding: 12px;
}
.result-item .ri-value {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--neon-amber);
}
.result-item .ri-value.reached {
  color: var(--neon-green);
}
.result-item .ri-value.locked {
  color: var(--neon-red);
}
.result-item .ri-label {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 2px;
}

.vip-table-wrap { overflow-x: auto; }
.vip-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 0.75rem;
}
.vip-table th {
  font-family: var(--font-display);
  font-size: 0.5rem;
  letter-spacing: 1px;
  color: var(--text-muted);
  text-transform: uppercase;
  padding: 6px 8px;
  border-bottom: 1px solid rgba(255, 230, 0, 0.15);
  text-align: right;
}
.vip-table th:first-child { text-align: left; }
.vip-table td {
  padding: 6px 8px;
  border-bottom: 1px solid rgba(255, 230, 0, 0.06);
  text-align: right;
}
.vip-table td:first-child { text-align: left; }
.vip-table tr.current td {
  color: var(--neon-yellow);
  font-weight: 700;
}
.vip-table tr.target td {
  color: var(--neon-green);
  font-weight: 700;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--dark-bg); }
::-webkit-scrollbar-thumb { background: var(--neon-yellow); border-radius: 3px; }

@media (max-width: 768px) {
  .header { padding-top: 36px; }
  .header h1 { font-size: 1.4rem; letter-spacing: 2px; }
  .app { padding: 10px; }
  .panel { padding: 12px; }
  .row { gap: 10px; }
  .col { min-width: 120px; }
  .result-grid { grid-template-columns: 1fr; }
  .result-vip-level { font-size: 2rem; }
}
</style>
</head>
<body>
<div class="lang-switch">
  <a href="calendar.html" class="cal-btn" data-i18n="calendar_btn">📅 Calendar</a>
  <button class="lang-btn" data-lang="ru">RU</button>
  <button class="lang-btn" data-lang="en">EN</button>
</div>
<div class="app" id="app">
  <header class="header">
    <div style="text-align:left;margin-bottom:4px;">
      <a href="index.html" style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);text-decoration:none;letter-spacing:1px;" data-i18n="back">← Главная</a>
    </div>
    <h1 class="flicker-glow-text">VIP CALCULATOR</h1>
    <div class="subtitle" data-i18n="subtitle">VIP Level Calculator</div>
    <div class="glitch-line"></div>
  </header>

  <div class="cyber-banner-small flicker-glow">
    <img src="logo.png" alt="VIP CALCULATOR" loading="lazy" onerror="this.style.display='none'">
  </div>

  <!-- INPUT -->
  <div class="panel">
    <div class="panel-title" data-i18n="input_title">Ввод данных</div>
    <div class="row">
      <div class="col">
        <label data-i18n="points_label">Текущие очки VIP</label>
        <input type="number" id="vipPoints" value="0" min="0">
      </div>
      <div class="col">
        <label data-i18n="target_label">Целевой уровень VIP</label>
        <select id="targetLevel"></select>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="panel result-panel">
    <div class="result-label" data-i18n="current_vip">Текущий уровень VIP</div>
    <div class="result-vip-level" id="currentLevel">0</div>

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 0 (0%)</div>

    <div class="result-grid">
      <div class="result-item">
        <div class="ri-value" id="neededTarget">—</div>
        <div class="ri-label" data-i18n="needed_target">Нужно до цели</div>
      </div>
      <div class="result-item">
        <div class="ri-value" id="neededNext">—</div>
        <div class="ri-label" data-i18n="needed_next">До следующего уровня</div>
      </div>
    </div>
  </div>

  <!-- VIP TABLE -->
  <div class="panel">
    <div class="panel-title" data-i18n="table_title">Таблица VIP</div>
    <div class="vip-table-wrap">
      <table class="vip-table">
        <thead>
          <tr>
            <th data-i18n="vip_level">Уровень</th>
            <th data-i18n="vip_points">Всего очков</th>
            <th data-i18n="vip_status">Статус</th>
          </tr>
        </thead>
        <tbody id="vipTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ===================== VIP DATA =====================
const VIP_LEVELS = [
  { level: 1, points: 200 },
  { level: 2, points: 400 },
  { level: 3, points: 1200 },
  { level: 4, points: 3500 },
  { level: 5, points: 6000 },
  { level: 6, points: 11500 },
  { level: 7, points: 17500 },
  { level: 8, points: 35000 },
  { level: 9, points: 75000 },
  { level: 10, points: 150000 },
  { level: 11, points: 250000 },
  { level: 12, points: 350000 },
  { level: 13, points: 500000 },
  { level: 14, points: 750000 },
  { level: 15, points: 1000000 },
  { level: 16, points: 1500000 },
  { level: 17, points: 2500000 },
  { level: 18, points: 4000000 },
];
const MAX_VIP = 18;

function getCurrentLevel(points) {
  let lvl = 0;
  for (const v of VIP_LEVELS) {
    if (points >= v.points) lvl = v.level;
  }
  return lvl;
}
function getPointsForLevel(level) {
  if (level < 1) return 0;
  const v = VIP_LEVELS.find(x => x.level === level);
  return v ? v.points : 0;
}
function fmtNum(n) { return Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' '); }

// ===================== I18N =====================
const LANG = {
  ru: {
    back: '← Главная',
    subtitle: 'VIP Калькулятор / VIP Calculator',
    page_title: 'VIP Calculator — Rise of Kingdoms',
    input_title: 'Ввод данных',
    points_label: 'Текущие очки VIP',
    target_label: 'Целевой уровень VIP',
    current_vip: 'Текущий уровень VIP',
    needed_target: 'Нужно до цели',
    needed_next: 'До следующего уровня',
    table_title: 'Таблица VIP',
    vip_level: 'Уровень', vip_points: 'Всего очков', vip_status: 'Статус',
    status_reached: 'Достигнут', status_current: 'Текущий', status_next: 'Следующий', status_locked: 'Закрыт',
    reached: 'Цель достигнута!',
    progress: 'Прогресс',
    calendar_btn: '📅 Календарь',
  },
  en: {
    back: '← Home',
    subtitle: 'VIP Calculator / VIP Калькулятор',
    page_title: 'VIP Calculator — Rise of Kingdoms',
    input_title: 'Input',
    points_label: 'Current VIP points',
    target_label: 'Target VIP level',
    current_vip: 'Current VIP level',
    needed_target: 'Points to target',
    needed_next: 'Points to next level',
    table_title: 'VIP Table',
    vip_level: 'Level', vip_points: 'Total points', vip_status: 'Status',
    status_reached: 'Reached', status_current: 'Current', status_next: 'Next', status_locked: 'Locked',
    reached: 'Target reached!',
    progress: 'Progress',
    calendar_btn: '📅 Calendar',
  },
};

const detected = navigator.language.startsWith('ru') ? 'ru' : 'en';
let lang = localStorage.getItem('lang') || detected;

function t(key) { return LANG[lang][key] || key; }

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (LANG[lang][key]) el.textContent = LANG[lang][key];
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  document.documentElement.lang = lang;
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    lang = btn.dataset.lang;
    localStorage.setItem('lang', lang);
    applyLang();
    calculate();
  });
});

applyLang();

// ===================== INIT =====================
const pointsInput = document.getElementById('vipPoints');
const targetSelect = document.getElementById('targetLevel');
const currentLevelEl = document.getElementById('currentLevel');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const neededTarget = document.getElementById('neededTarget');
const neededNext = document.getElementById('neededNext');
const vipTableBody = document.getElementById('vipTableBody');

// Populate target level dropdown
for (const v of VIP_LEVELS) {
  const opt = document.createElement('option');
  opt.value = v.level;
  opt.textContent = `${v.level} (${fmtNum(v.points)})`;
  targetSelect.appendChild(opt);
}

function calculate() {
  const points = parseInt(pointsInput.value) || 0;
  const target = parseInt(targetSelect.value) || 1;
  const current = getCurrentLevel(points);

  // Current level display
  currentLevelEl.textContent = current;

  // Progress to target
  const targetPoints = getPointsForLevel(target);
  const progress = targetPoints > 0 ? Math.min(100, (points / targetPoints) * 100) : 0;
  progressFill.style.width = progress + '%';
  const pct = Math.min(100, progress).toFixed(1);
  progressLabel.textContent = `${fmtNum(points)} / ${fmtNum(targetPoints)} (${pct}%)`;

  // Needed to target
  if (points >= targetPoints) {
    neededTarget.textContent = t('reached');
    neededTarget.className = 'ri-value reached';
  } else {
    neededTarget.textContent = fmtNum(targetPoints - points);
    neededTarget.className = 'ri-value';
  }

  // Needed to next level
  const nextLevel = Math.min(current + 1, MAX_VIP);
  const nextPoints = getPointsForLevel(nextLevel);
  if (current >= MAX_VIP) {
    neededNext.textContent = 'MAX';
    neededNext.className = 'ri-value';
  } else if (points >= nextPoints) {
    neededNext.textContent = t('reached');
    neededNext.className = 'ri-value reached';
  } else {
    neededNext.textContent = fmtNum(nextPoints - points);
    neededNext.className = 'ri-value';
  }

  // VIP table
  renderTable(points, current, target);
}

function renderTable(points, current, target) {
  let html = '';
  for (const v of VIP_LEVELS) {
    let status = t('status_locked');
    let cls = '';
    if (points >= v.points) {
      status = t('status_reached');
      if (v.level === current) {
        status = t('status_current');
        cls = 'current';
      }
    }
    if (v.level === target && points < v.points) {
      cls = 'target';
    }
    html += `<tr class="${cls}"><td>VIP ${v.level}</td><td>${fmtNum(v.points)}</td><td>${status}</td></tr>`;
  }
  vipTableBody.innerHTML = html;
}

// Auto-fill target = current level + 1 when points change
pointsInput.addEventListener('input', () => {
  const points = parseInt(pointsInput.value) || 0;
  const current = getCurrentLevel(points);
  const next = Math.min(current + 1, MAX_VIP);
  targetSelect.value = next;
  calculate();
});

targetSelect.addEventListener('change', calculate);

calculate();
</script>
</body>
</html>
